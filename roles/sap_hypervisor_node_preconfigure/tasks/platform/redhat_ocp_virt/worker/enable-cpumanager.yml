---

- name: Redhat OCP Virt - Enable CPU Manager by patching MCP worker
  kubernetes.core.k8s:
    state: patched
    definition:
      apiVersion: machineconfiguration.openshift.io/v1
      kind: MachineConfigPool
      metadata:
        name: worker
        labels:
          custom-kubelet: cpumanager-enabled

- name: Redhat OCP Virt - Delete kubletconfig for cpumanager
  kubernetes.core.k8s:
    state: absent
    definition:
      apiVersion: machineconfiguration.openshift.io/v1
      kind: KubeletConfig
      metadata:
        name: cpumanager-enabled
      spec:
        machineConfigPoolSelector:
          matchLabels:
            custom-kubelet: cpumanager-enabled
        kubeletConfig:
          cpuManagerPolicy: static
          cpuManagerReconcilePeriod: 5s

- name: Redhat OCP Virt - Create kubletconfig for cpumanager worker with CPUs reserved for kubernetes
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: machineconfiguration.openshift.io/v1
      kind: KubeletConfig
      metadata:
        name: cpumanager-enabled
      spec:
        machineConfigPoolSelector:
          matchLabels:
            custom-kubelet: cpumanager-enabled
        kubeletConfig:
          cpuManagerPolicy: static
          cpuManagerReconcilePeriod: 5s
          reservedSystemCPUs: "{{ sap_hypervisor_node_preconfigure_cluster_config.worker_kubernetes_reserved_cpus }}"
  when: sap_hypervisor_node_preconfigure_cluster_config.worker_kubernetes_reserved_cpus | d('') | length > 0

- name: Redhat OCP Virt - Create kubletconfig for cpumanager worker
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: machineconfiguration.openshift.io/v1
      kind: KubeletConfig
      metadata:
        name: cpumanager-enabled
        machineconfiguration.openshift.io/role: worker
      spec:
        machineConfigPoolSelector:
          matchLabels:
            custom-kubelet: cpumanager-enabled
        kubeletConfig:
          cpuManagerPolicy: static
          cpuManagerReconcilePeriod: 5s
  when: sap_hypervisor_node_preconfigure_cluster_config.worker_kubernetes_reserved_cpus | d('') | length == 0

- name: Redhat OCP Virt - Include wait mcp finished updating
  ansible.builtin.include_tasks:
    file: "platform/{{ sap_hypervisor_node_preconfigure_platform }}/cluster/wait-mcp-finished-updating.yml"
