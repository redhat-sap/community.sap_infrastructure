---

- name: Redhat OCP Virt - Check configuration
  ansible.builtin.include_tasks:
    file: "platform/{{ sap_hypervisor_node_preconfigure_platform }}/assert/main.yml"

- name: Redhat OCP Virt - Get a list of all nodes from any namespace
  kubernetes.core.k8s_info:
    kind: Node
  register: __sap_hypervisor_node_preconfigure_register_node_list

- name: Redhat OCP Virt - Generate list with worker node names
  ansible.builtin.set_fact:
    __sap_hypervisor_node_preconfigure_fact_worker_node_name_list:
      "{{ __sap_hypervisor_node_preconfigure_fact_worker_node_name_list | d([]) + [worker_item.name] }}"
  loop: "{{ sap_hypervisor_node_preconfigure_cluster_config.workers }}"
  loop_control:
    loop_var: worker_item

- name: Redhat OCP Virt - Filter hosts
  ansible.builtin.set_fact:
    __sap_hypervisor_node_preconfigure_fact_nodes:
      "{{ __sap_hypervisor_node_preconfigure_fact_nodes | d([]) + [node_item] }}"
  loop: "{{ __sap_hypervisor_node_preconfigure_register_node_list['resources'] }}"
  loop_control:
    loop_var: node_item
  when: node_item.metadata.name in __sap_hypervisor_node_preconfigure_fact_worker_node_name_list

- name: Redhat OCP Virt - Assert that configured nodes are found
  ansible.builtin.assert:
    that:
      - __sap_hypervisor_node_preconfigure_fact_nodes is defined
      - __sap_hypervisor_node_preconfigure_fact_nodes | length > 0
    fail_msg: |
      FAIL: No nodes found that match configuration provided in the variable 'sap_hypervisor_node_preconfigure_cluster_config'.

# Determine available memory on first worker node.
# This amount will be used for all nodes, so make sure all have an identical amount.
- name: Redhat OCP Virt - Get worker name
  ansible.builtin.set_fact:
    __sap_hypervisor_node_preconfigure_fact_worker_name:
      "{{ __sap_hypervisor_node_preconfigure_fact_nodes[0]['metadata']['labels']['kubernetes.io/hostname'] }}"

- name: Redhat OCP Virt - Get memory of first worker node (will be used for all worker nodes later on)
  ansible.builtin.set_fact:
    __sap_hypervisor_node_preconfigure_fact_worker_memory_gib:
      "{{ (__sap_hypervisor_node_preconfigure_fact_nodes[0]['status']['capacity']['memory'] | replace('Ki', '') | int / 1048576) }}"

- name: Redhat OCP Virt - Check if host has minimal amount of memory (96GiB)
  ansible.builtin.assert:
    that: __sap_hypervisor_node_preconfigure_fact_worker_memory_gib | int >= 96
    fail_msg: |
      FAIL: Not enough memory on the node {{ __sap_hypervisor_node_preconfigure_fact_worker_name }}
  when: not sap_hypervisor_node_preconfigure_ignore_minimal_memory_check | d(false)

# calculate memory to be allocated as hugepages
# if system < 512GiB memory use 32GiB as upper boundary, 64GB otherwise as upper boundary
- name: Redhat OCP Virt - Calculate amount of hugepages to reserve (host memory < 512 GiB)
  ansible.builtin.set_fact:
    __sap_hypervisor_node_preconfigure_fact_worker_reserved_hugepages:
      "{{ (__sap_hypervisor_node_preconfigure_fact_worker_memory_gib | int) - sap_hypervisor_node_preconfigure_hypervisor_reserved_ram_host_lt_512 }}"
  when: (__sap_hypervisor_node_preconfigure_fact_worker_memory_gib | int) < 512

- name: Redhat OCP Virt - Calculate amount of hugepages to reserve (host memory >= 512 GiB)
  ansible.builtin.set_fact:
    __sap_hypervisor_node_preconfigure_fact_worker_reserved_hugepages:
      "{{ (__sap_hypervisor_node_preconfigure_fact_worker_memory_gib | int) - sap_hypervisor_node_preconfigure_hypervisor_reserved_ram_host_ge_512 }}"
  when: (__sap_hypervisor_node_preconfigure_fact_worker_memory_gib | int) >= 512

- name: Redhat OCP Virt - Include prepare
  ansible.builtin.include_tasks:
    file: "platform/{{ sap_hypervisor_node_preconfigure_platform }}/prepare.yml"

- name: Redhat OCP Virt - Include patch cluster masters unschedulable
  ansible.builtin.include_tasks:
    file: "platform/{{ sap_hypervisor_node_preconfigure_platform }}/master/patch-cluster-masters-unschedulable.yml"

- name: Redhat OCP Virt - Include tuned virtual host
  ansible.builtin.include_tasks:
    file: "platform/{{ sap_hypervisor_node_preconfigure_platform }}/worker/tuned-virtual-host.yml"

- name: Redhat OCP Virt - Include install operators
  ansible.builtin.include_tasks:
    file: "platform/{{ sap_hypervisor_node_preconfigure_platform }}/operators/main.yml"
  when: sap_hypervisor_node_preconfigure_install_operators

- name: Redhat OCP Virt - Include setup worker nodes
  ansible.builtin.include_tasks:
    file: "platform/{{ sap_hypervisor_node_preconfigure_platform }}/worker/setup-worker-nodes.yml"
  when: sap_hypervisor_node_preconfigure_setup_worker_nodes

- name: Redhat OCP Virt - Include task enable featuregate downwardmetrics
  ansible.builtin.include_tasks:
    file: "platform/{{ sap_hypervisor_node_preconfigure_platform }}/cluster/enable-featuregate-downwardmetrics.yml"

- name: Redhat OCP Virt - Include Trident installation
  ansible.builtin.include_tasks:
    file: "platform/{{ sap_hypervisor_node_preconfigure_platform }}/storage/install-trident.yml"
  when: sap_hypervisor_node_preconfigure_install_trident

- name: Redhat OCP Virt - Include local storage creation (HPP)
  ansible.builtin.include_tasks:
    file: "platform/{{ sap_hypervisor_node_preconfigure_platform }}/storage/install-hpp.yml"
  when: sap_hypervisor_node_preconfigure_install_hpp

- name: Redhat OCP Virt - Remove temporary directory
  ansible.builtin.file:
    path: "{{ __sap_hypervisor_node_preconfigure_register_tmpdir_role.path }}"
    state: absent
