# SPDX-License-Identifier: Apache-2.0
---

- name: Redhat OCP Virt - Gather Facts
  ansible.builtin.gather_facts:

- name: Redhat OCP Virt - Create Tempdir
  ansible.builtin.tempfile:
    state: directory
    suffix: "_sap_hypervisor_node_preconfigure_role"
  register: __sap_hypervisor_node_preconfigure_register_tmpdir_role

- name: Redhat OCP Virt - Create VM namespace {{ sap_hypervisor_node_preconfigure_cluster_config.vm_namespace }}
  kubernetes.core.k8s:
    name: "{{ sap_hypervisor_node_preconfigure_cluster_config.vm_namespace }}"
    api_version: v1
    kind: Namespace
    state: present
