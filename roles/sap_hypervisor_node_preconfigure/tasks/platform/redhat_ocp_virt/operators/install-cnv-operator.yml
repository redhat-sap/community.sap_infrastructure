# SPDX-License-Identifier: Apache-2.0
---

- name: Redhat OCP Virt - Create the CNV Operator namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ sap_hypervisor_node_preconfigure_ocpv_namespace }}"

- name: Redhat OCP Virt - Create CNV OperatorGroup kubevirt-hyperconverged-group
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1
      kind: OperatorGroup
      metadata:
        name: kubevirt-hyperconverged-group
        namespace: "{{ sap_hypervisor_node_preconfigure_ocpv_namespace }}"
      spec:
        targetNamespaces:
          - "{{ sap_hypervisor_node_preconfigure_ocpv_namespace }}"

- name: Redhat OCP Virt - Create CNV Subscription
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: hco-operatorhub
        namespace: "{{ sap_hypervisor_node_preconfigure_ocpv_namespace }}"
      spec:
        source: redhat-operators
        sourceNamespace: openshift-marketplace
        name: kubevirt-hyperconverged
        channel: "{{ sap_hypervisor_node_preconfigure_ocpv_subscription_channel }}"

- name: Redhat OCP Virt - Get Install Plan Name from Subscription
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: hco-operatorhub
    namespace: "{{ sap_hypervisor_node_preconfigure_ocpv_namespace }}"
  register: __sap_hypervisor_node_preconfigure_register_cnv_subscription_install_plan_name
  retries: 10
  delay: 10
  until: __sap_hypervisor_node_preconfigure_register_cnv_subscription_install_plan_name.resources[0].status.installPlanRef.name is defined
  changed_when: true

- name: Wait for Install Plan to finish
  block:
    # Reason for noqa: Ignore errors during retry loop and fail in subsequent task.
    - name: Redhat OCP Virt - Get Install Plan details  # noqa: ignore-errors
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: InstallPlan
        name: "{{ __sap_hypervisor_node_preconfigure_register_cnv_subscription_install_plan_name.resources[0].status.installPlanRef.name }}"
        namespace: "{{ sap_hypervisor_node_preconfigure_ocpv_namespace }}"
      register: __sap_hypervisor_node_preconfigure_register_wait_for_installplan
      retries: 60
      delay: 5
      until: __sap_hypervisor_node_preconfigure_register_wait_for_installplan.resources[0].status.phase == "Complete"
      ignore_errors: true

    - name: Redhat OCP Virt - Fail if Install Plan is not Complete after waiting
      ansible.builtin.fail:
        msg: |
          FAIL: Install Plan is not Complete after the specified wait period.
      when: __sap_hypervisor_node_preconfigure_register_wait_for_installplan.resources[0].status.phase != "Complete"

- name: Redhat OCP Virt - Wait for pod with name hyperconverged-cluster-webhook under the namespace {{ sap_hypervisor_node_preconfigure_ocpv_namespace }}
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ sap_hypervisor_node_preconfigure_ocpv_namespace }}"
    label_selectors:
      - name=hyperconverged-cluster-webhook
  register: __sap_hypervisor_node_preconfigure_register_hco_webhook_pod_1
  retries: 5
  delay: 60
  until: __sap_hypervisor_node_preconfigure_register_hco_webhook_pod_1.resources | selectattr('status.phase', 'equalto', 'Running') | list | length
    == __sap_hypervisor_node_preconfigure_register_hco_webhook_pod_1.resources | length

- name: Redhat OCP Virt - Wait for pod with name hco-webhook under the namespace "{{ sap_hypervisor_node_preconfigure_ocpv_namespace }}"
  kubernetes.core.k8s_info:
    kind: Pod
    namespace: "{{ sap_hypervisor_node_preconfigure_ocpv_namespace }}"
    label_selectors:
      - name=hco-webhook
  register: __sap_hypervisor_node_preconfigure_register_hco_webhook_pod_2
  retries: 5
  delay: 60
  until: __sap_hypervisor_node_preconfigure_register_hco_webhook_pod_2.resources | selectattr('status.phase', 'equalto', 'Running') | list | length
    == __sap_hypervisor_node_preconfigure_register_hco_webhook_pod_2.resources | length

- name: Redhat OCP Virt - Check if hco-webhook-service webhook endpoint is available
  ansible.builtin.include_tasks:
    file: wait_for_webhook_endpoints.yml
  vars:
    sap_hypervisor_node_preconfigure_webhook_service_name: hco-webhook-service
    sap_hypervisor_node_preconfigure_webhook_namespace: "{{ sap_hypervisor_node_preconfigure_ocpv_namespace }}"

- name: Redhat OCP Virt - Create CNV HyperConverged
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: hco.kubevirt.io/v1beta1
      kind: HyperConverged
      metadata:
        name: kubevirt-hyperconverged
        namespace: "{{ sap_hypervisor_node_preconfigure_ocpv_namespace }}"

- name: Redhat OCP Virt - Retrieve HyperConverged Status
  kubernetes.core.k8s_info:
    api_version: hco.kubevirt.io/v1beta1
    kind: HyperConverged
    name: kubevirt-hyperconverged
    wait: true
    namespace: "{{ sap_hypervisor_node_preconfigure_ocpv_namespace }}"
    wait_condition:
      type: Available
      status: true
    wait_timeout: 600
  register: __sap_hypervisor_node_preconfigure_register_hyperconverged_status

- name: Redhat OCP Virt - Fail if HyperConverged is not Available
  ansible.builtin.fail:
    msg: |
      FAIL: HyperConverged is not Available after the specified wait period.
  when: __sap_hypervisor_node_preconfigure_register_hyperconverged_status.failed
