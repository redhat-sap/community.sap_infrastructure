---

- name: Redhat OCP Virt - Wait for webhook endpoints
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Endpoints
    name: "{{ sap_hypervisor_node_preconfigure_webhook_service_name }}"
    namespace: "{{ sap_hypervisor_node_preconfigure_webhook_namespace }}"
  register: __sap_hypervisor_node_preconfigure_register_webhook_check
  until:
    - __sap_hypervisor_node_preconfigure_register_webhook_check is defined
    - __sap_hypervisor_node_preconfigure_register_webhook_check.resources | d([]) | length > 0
    - __sap_hypervisor_node_preconfigure_register_webhook_check.resources[0].subsets is defined
    - __sap_hypervisor_node_preconfigure_register_webhook_check.resources[0].subsets | d([]) | length > 0
    - __sap_hypervisor_node_preconfigure_register_webhook_check.resources[0].subsets[0].addresses is defined
    - __sap_hypervisor_node_preconfigure_register_webhook_check.resources[0].subsets[0].addresses | d([]) | length > 0
  retries: "{{ sap_hypervisor_node_preconfigure_webhook_retries | d(30) }}"
  delay: "{{ sap_hypervisor_node_preconfigure_webhook_delay | d(10) }}"

- name: Redhat OCP Virt - Fail if webhook endpoints never became available
  ansible.builtin.fail:
    msg: >
      FAIL: Webhook {{ sap_hypervisor_node_preconfigure_webhook_service_name }} in namespace
      {{ sap_hypervisor_node_preconfigure_webhook_namespace }} did not become available in time.
  when: __sap_hypervisor_node_preconfigure_register_webhook_check is failed
