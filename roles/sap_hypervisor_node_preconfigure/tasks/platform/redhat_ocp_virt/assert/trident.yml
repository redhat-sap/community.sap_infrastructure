---

- name: Redhat OCP Virt - Define required trident keys
  ansible.builtin.set_fact:
    __sap_hypervisor_node_preconfigure_fact_required_trident_keys:
      - management
      - data
      - svm
      - backend
      - aggregate
      - username
      - password
      - storage_driver
      - storage_prefix
      - nfs_mount_options
      - export_policy
      - storageclass_name
      - default_storageclass

- name: Redhat OCP Virt - Check each trident key for existence and non-empty value
  ansible.builtin.set_fact:
    __sap_hypervisor_node_preconfigure_trident_missing_or_empty_keys:
      "{{ __sap_hypervisor_node_preconfigure_trident_missing_or_empty_keys | d([]) + [trident_key_item] }}"
  loop: "{{ __sap_hypervisor_node_preconfigure_fact_required_trident_keys }}"
  loop_control:
    loop_var: trident_key_item
  when: sap_hypervisor_node_preconfigure_cluster_config.trident[trident_key_item] | d('') | string | trim | length == 0

- name: Redhat OCP Virt - Assert all trident keys are present and non-empty
  ansible.builtin.assert:
    that:
      - __sap_hypervisor_node_preconfigure_trident_missing_or_empty_keys | length == 0
    fail_msg: >-
      FAIL: The following trident keys are missing or empty:
      {{ __sap_hypervisor_node_preconfigure_trident_missing_or_empty_keys | join(', ') }}
