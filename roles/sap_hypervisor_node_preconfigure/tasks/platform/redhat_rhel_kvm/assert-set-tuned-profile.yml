---

- name: Redhat RHEL KVM - Get tuned profile
  ansible.builtin.command:
    cmd: tuned-adm active
  register: __sap_hypervisor_node_preconfigure_register_tuned_profile_assert
  changed_when: __sap_hypervisor_node_preconfigure_register_tuned_profile_assert.rc != 0

- name: Redhat RHEL KVM - Verify tuned profile
  ansible.builtin.assert:
    that: "'Current active profile: sap-hana-kvm-host' in __sap_hypervisor_node_preconfigure_register_tuned_profile_assert.stdout"
    fail_msg: "FAIL: tuned profile is not sap-hana-kvm-host"
    success_msg: "PASS: tuned profile is sap-hana-kvm-host"
  when: not sap_hypervisor_node_preconfigure_ignore_failed_assertion
