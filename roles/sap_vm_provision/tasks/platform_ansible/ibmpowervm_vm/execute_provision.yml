---

# NOTE: Pre-requisite to create IBM PowerVC Storage Templates (OpenStack Cinder Volume Type),
# which is not possible from Ansible Collection for Openstack
# www.ibm.com/docs/en/powervc/latest?topic=apis-supported-volume-type-extra-specs
### Show IBM PowerVC Storage list
### openstack --insecure volume service list --service cinder-volume
### Show IBM PowerVC Storage Template list
### openstack --insecure volume type list

# When SAP HANA Scale-Out is used, if host name is not in original specifications then strip suffix node number from host name
- name: SAP VM Provision - IBM PowerVM - Set host spec for SAP HANA Scale-Out
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_scaleout_origin_hostname: "{{ inventory_hostname | regex_replace('^(.+?)\\d*$', '\\1') }}"
  when:
    - sap_vm_provision_calculate_sap_hana_scaleout_active_coordinator is defined
    - not inventory_hostname in __sap_vm_provision_host_dict_plan.keys()

- name: SAP VM Provision - IBM PowerVM - Check if VM exists
  openstack.cloud.server_info:
    name: "{{ inventory_hostname }}"
    validate_certs: false # Allow Self-Signed Certificate
    auth: "{{ __sap_vm_provision_fact_ibmpowervm_openstack_auth_delegate }}"
  register: __sap_vm_provision_register_provision_host_single_check_exists
  no_log: "{{ __sap_vm_provision_no_log }}"

- name: SAP VM Provision - IBM PowerVM - Check OS Image available in IBM PowerVM
  openstack.cloud.image_info:
    image: "{{ sap_vm_provision_ibmpowervm_vm_host_os_image }}"
    validate_certs: false # Allow Self-Signed Certificate
    auth: "{{ __sap_vm_provision_fact_ibmpowervm_openstack_auth_delegate }}"
  register: __sap_vm_provision_register_ibmpowervm_os_image_info
  no_log: "{{ __sap_vm_provision_no_log }}"


- name: SAP VM Provision - IBM PowerVM - Check network available in IBM PowerVM
  openstack.cloud.networks_info:
    name: "{{ sap_vm_provision_ibmpowervm_network_name }}"
    validate_certs: false # Allow Self-Signed Certificate
    auth: "{{ __sap_vm_provision_fact_ibmpowervm_openstack_auth }}"
  register: __sap_vm_provision_register_ibmpowervm_network
  no_log: "{{ __sap_vm_provision_no_log }}"

- name: Block that provisions the VM
  when: __sap_vm_provision_register_provision_host_single_check_exists.servers | d([]) | length == 0
  block:

    # See documented IBM PowerVM Compute Template (OpenStack Flavor) extra specs
    # www.ibm.com/docs/en/powervc/latest?topic=apis-flavors-extra-specs
    - name: SAP VM Provision - IBM PowerVM - Create IBM PowerVM Compute Template
      openstack.cloud.compute_flavor:

        state: present
        name: "{{ inventory_hostname }}-compute-template"

        ## Virtual Machine main resources definition
        # Assume SMT-8, 1 IBM Power CPU Core therefore divide by 8 = CPU Threads
        # Virtual Processors (i.e. IBM Power CPU Cores), Desired. API must receive an integer
        vcpus:
          "{{ (__sap_vm_provision_host_dict_spec.ibmpowervm_vm_cpu_threads / __sap_vm_provision_host_dict_spec.ibmpowervm_vm_cpu_smt)
            | round(0, 'common') | int }}"
        ram: "{{ (__sap_vm_provision_host_dict_spec.ibmpowervm_vm_memory_gib * 1024) | int }}" # Memory (MiB), Desired
        disk: 0 # Must be set to 0 otherwise conflicts with OS Image template
        swap: 0 # Must be set to 0 otherwise error "failed with exception: Build of instance xxxx was re-scheduled: list index out of range"
        is_public: true

        # After creation, modifications to extra_specs parameters may not be identified
        extra_specs:
          ####  Virtual Processors (i.e. IBM Power CPU Cores) - for Production systems must be minimum of 4 ####
          # Virtual Processors (i.e. IBM Power CPU Cores), Minimum. Value of 1 is lowest possible. API must receive an integer
          "powervm:min_vcpu":
            "{{ [((__sap_vm_provision_host_dict_spec.ibmpowervm_vm_cpu_threads / __sap_vm_provision_host_dict_spec.ibmpowervm_vm_cpu_smt) * 0.75)
              | round(0, 'floor'), 1] | max | int }}"
          # Virtual Processors (i.e. IBM Power CPU Cores), Maximum. API must receive an integer
          "powervm:max_vcpu":
            "{{ ((__sap_vm_provision_host_dict_spec.ibmpowervm_vm_cpu_threads / __sap_vm_provision_host_dict_spec.ibmpowervm_vm_cpu_smt) * 1.20)
              | round(0, 'ceil') | int }}"

          ####  Dynamic LPAR Entitled Capacity of Virtual Processor units (i.e. IBM Power CPU Cores guaranteed to be available)  ####
          # Processing units set minimum to 80% of the minimum Virtual Processors (i.e. IBM Power CPU Cores)
          # Processing units set standard to 80% of the Virtual Processors (i.e. IBM Power CPU Cores)
          # Processing units set maximum to 100% of the maximum Virtual Processors (i.e. IBM Power CPU Cores)
          # Processing units, Minimum
          "powervm:min_proc_units":
            "{{ ((((__sap_vm_provision_host_dict_spec.ibmpowervm_vm_cpu_threads / __sap_vm_provision_host_dict_spec.ibmpowervm_vm_cpu_smt) * 0.75)
              | round(1, 'floor')) * 0.8) | round(2, 'floor') | float }}"
          # Processing units, Desired
          "powervm:proc_units":
            "{{ ((__sap_vm_provision_host_dict_spec.ibmpowervm_vm_cpu_threads / __sap_vm_provision_host_dict_spec.ibmpowervm_vm_cpu_smt)
              | round(0, 'common')) * 0.8 | round(2, 'common') | float }}"
          # Processing units, Maximum
          "powervm:max_proc_units":
            "{{ ((__sap_vm_provision_host_dict_spec.ibmpowervm_vm_cpu_threads / __sap_vm_provision_host_dict_spec.ibmpowervm_vm_cpu_smt) * 1.20)
              | round(0, 'ceil') | float }}"

          "powervm:dedicated_proc": "false"
          # "powervm:dedicated_sharing_mode": "share_idle_procs"
          # When 'dedicated_proc' true, share_idle_procs = "Allow processor sharing when the virtual machine is inactive"
          "powervm:uncapped": "true"
          "powervm:shared_weight": 128
          "powervm:shared_proc_pool_name": "{{ sap_vm_provision_ibmpowervm_host_group_shared_procesor_pool_name }}"
          "powervm:processor_compatibility": "default"

          # Memory, Minimum. API must receive an integer
          "powervm:min_mem":
            "{{ (__sap_vm_provision_host_dict_spec.ibmpowervm_vm_memory_gib * 1024)
              - (0.25 * (__sap_vm_provision_host_dict_spec.ibmpowervm_vm_memory_gib * 1024))
                | round(0, 'ceil') | int }}"
          # Memory, Maximum. API must receive an integer
          "powervm:max_mem": "{{ (__sap_vm_provision_host_dict_spec.ibmpowervm_vm_memory_gib * 1024) | round(0, 'ceil') | int }}"

          # "powervm:ame_expansion_factor": 0
          "powervm:enforce_affinity_check": "true"
          "powervm:enable_lpar_metric": "true"
          "powervm:availability_priority": 127 # Default is 127, Higher Priority default is 191
          # "powervm:ppt_ratio": "1:1024"
          "powervm:secure_boot": 0 # "Disabled"
          "powervm:srr_capability": "false" # Disable the Simplified Remote Restart

        validate_certs: false # Allow Self-Signed Certificate
        auth: "{{ __sap_vm_provision_fact_ibmpowervm_openstack_auth }}"

      register: __sap_vm_provision_register_ibmpowervm_compute_template
      no_log: "{{ __sap_vm_provision_no_log }}"


    - name: SAP VM Provision - IBM PowerVM - Provision IBM PowerVM vNIC (Network Port)
      openstack.cloud.port:
        state: present
        name: "{{ inventory_hostname }}-vnic0"
        network: "{{ sap_vm_provision_ibmpowervm_network_name }}"
        # fixed_ips:
        #   - ip_address: "{{ ansible_host }}"
        # vNIC Mode is either 'direct' for SR-IOV, or 'normal' for Shared Ethernet Adapter (SEA)
        vnic_type: "{{ sap_vm_provision_ibmpowervm_network_vnic_type }}"
        # capacity = vNIC using SR-IOV Minimum Capacity percentage of total SR-IOV Port Bandwidth (must be above '0.02' for 2%)
        # vnic_required_vfs = vNIC using SR-IOV Port Redundancy level, '1' for Non-Redundant and '2' for Redundant
        binding_profile: |-
          {% set vnic_config = [] -%}
          {%- if sap_vm_provision_ibmpowervm_network_vnic_type == 'normal' -%}
            {% set map = vnic_config.extend([{
                'delete_with_instance': '1'
              }]) -%}
          {%- elif sap_vm_provision_ibmpowervm_network_vnic_type == 'direct' -%}
            {% set map = vnic_config.extend([{
                'delete_with_instance': '1',
                'capacity': '0.02',
                'vnic_required_vfs': '2'
              }]) -%}
          {%- endif -%}
          {{ vnic_config[0] }}
        validate_certs: false # Allow Self-Signed Certificate
        auth: "{{ __sap_vm_provision_fact_ibmpowervm_openstack_auth }}"
      register: __sap_vm_provision_register_provision_host_single_vnic
      no_log: "{{ __sap_vm_provision_no_log }}"


    - name: SAP VM Provision - IBM PowerVM - Provision IBM PowerVM Virtual Machine (LPAR)
      openstack.cloud.server:

        ## Virtual Machine target Hypervisor definition
        availability_zone: "{{ sap_vm_provision_ibmpowervm_host_group_name }}" # IBM PowerVM Hypervisor Cluster Host Group Name
        # region_name: "RegionOne"

        ## Virtual Machine definition
        state: present
        wait: true # wait until VM is running before Ansible Module is marked as completed
        timeout: 1200 # seconds, wait 20 minutes for VM to provision
        name: "{{ inventory_hostname }}"
        description: "{{ inventory_hostname }} created by Ansible Playbook for SAP"

        ## Virtual Machine main resources definition
        flavor: "{{ __sap_vm_provision_register_ibmpowervm_compute_template.flavor.id }}"
        # Do not set boot_from_volume, boot_volume or volumes parameters when cloning OS Image template
        image: "{{ sap_vm_provision_ibmpowervm_vm_host_os_image }}"
        terminate_volume: true
        key_name: "{{ sap_vm_provision_ibmpowervm_key_pair_name_ssh_host_public_key }}"

        ## Virtual Machine Network configuration - vNICs
        auto_ip: false
        # network: "{{ sap_vm_provision_ibmpowervm_network_name }}"
        nics:
          - port-name: "{{ inventory_hostname }}-vnic0"

        ## Post-provisioning: Virtual Machine post configuration
        meta:
          hostname: "{{ inventory_hostname }}"
        # userdata: | # cloud-init userdata

        # Anti-Affinity, IBM PowerVM Collocation Rule (OpenStack Server Group ID) to provision VM to different hosts
        # www.ibm.com/docs/en/powervc/latest?topic=powervc-terminology
        # www.ibm.com/docs/en/powervc/latest?topic=powervc-collocation-rules
        # www.ibm.com/support/pages/powervc-anti-affinity-co-location-rules
        scheduler_hints:
          # same_host: "" # Affinity, Provision VM to specific host
          # additional_properties:
          #   "drivers:multipath": "0"
          group: "{{ __placement_group }}"

        validate_certs: false # Allow Self-Signed Certificate
        auth: "{{ __sap_vm_provision_fact_ibmpowervm_openstack_auth }}"

      register: __sap_vm_provision_register_provision_host_single
      no_log: "{{ __sap_vm_provision_no_log }}"

      # Report VM provisioning complete, only after status is Active (not Building)
      # If provisioning error occurs (e.g. 'Could not find image XYZ with exclude (deprecated)') then
      # will show error as 'The conditional check __sap_vm_provision_register_provision_host_single.server.status == "ACTIVE" failed
      # and the actual error will be hidden unless the 'until' is commented-out
      until:
        - __sap_vm_provision_register_provision_host_single.server.status is defined
        - __sap_vm_provision_register_provision_host_single.server.status == "ACTIVE"
      retries: 120
      delay: 5
      throttle: "{{ (1 | int) if sap_vm_provision_ibmpowervm_placement_strategy_spread else d(omit) }}"
      vars:
        __placement_group: "{{ (
          (__sap_vm_provision_register_ibmpowervm_collocation_rule.results | selectattr('item','==','hana'))[0].name
          if (sap_vm_provision_group_hana_primary in __sap_vm_provision_host_dict_spec.sap_host_type
            or sap_vm_provision_group_hana_secondary in __sap_vm_provision_host_dict_spec.sap_host_type)
          else
          (__sap_vm_provision_register_ibmpowervm_collocation_rule.results | selectattr('item','==','anydb'))[0].name
          if (sap_vm_provision_group_anydb_primary in __sap_vm_provision_host_dict_spec.sap_host_type
            or sap_vm_provision_group_anydb_secondary in __sap_vm_provision_host_dict_spec.sap_host_type)
          else
          (__sap_vm_provision_register_ibmpowervm_collocation_rule.results | selectattr('item','==','nwas'))[0].name
          if (sap_vm_provision_group_nwas_ascs in __sap_vm_provision_host_dict_spec.sap_host_type
            or sap_vm_provision_group_nwas_ers in __sap_vm_provision_host_dict_spec.sap_host_type)
          ) | d(omit) }}"


- name: SAP VM Provision - IBM PowerVM - Collect info on IBM PowerVM vNIC (Network Port)
  openstack.cloud.port_info:
    name: "{{ inventory_hostname }}-vnic0"
    validate_certs: false # Allow Self-Signed Certificate
    auth: "{{ __sap_vm_provision_fact_ibmpowervm_openstack_auth }}"
  register: __sap_vm_provision_register_provision_host_single_vnic
  no_log: "{{ __sap_vm_provision_no_log }}"

- name: SAP VM Provision - IBM PowerVM - Create fact for delegate host IP
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_private_ip: "{{ __sap_vm_provision_register_provision_host_single.resource.networks[0].ip }}"


- name: SAP VM Provision - IBM PowerVM - Copy facts to delegate host - when using Bastion SSH Proxy connection from Ansible control node to target node/s
  delegate_to: "{{ __sap_vm_provision_fact_private_ip }}"
  delegate_facts: true
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_ssh_args_bastion: >-
      -o ProxyCommand='ssh -W %h:%p {{ sap_vm_provision_bastion_user }}@{{ sap_vm_provision_bastion_public_ip }}
      -p {{ sap_vm_provision_bastion_ssh_port }}
      -i {{ sap_vm_provision_ssh_bastion_private_key_file_path }}
      {{ sap_vm_provision_ssh_bastion_ssh_args }}'
  when:
    - sap_vm_provision_bastion_execution
    - sap_vm_provision_bastion_user | d('') != ''
    - sap_vm_provision_bastion_public_ip | d('') != ''
    - sap_vm_provision_bastion_ssh_port | d('') != ''
    - sap_vm_provision_ssh_bastion_private_key_file_path | d('') != ''


# OpenStack APIs cannot query the IBM PowerVC APIs directly,
# therefore cannot check the VM Health status (Warning or OK) which
# is based on connection status to RMC (Resource Monitoring and Control subsystem).
# Ignore checking this fact as it does not reflect VM readiness to execute.

- name: SAP VM Provision - IBM PowerVM - Wait for VM connection readiness
  ansible.builtin.wait_for:
    host: "{{ __sap_vm_provision_fact_private_ip }}"
    port: 22
    delay: 10
    sleep: 10
    timeout: 600
  when:
    - not sap_vm_provision_bastion_execution

- name: SAP VM Provision - IBM PowerVM - Wait for VM connection readiness - use Bastion host to check for response
  remote_user: "{{ sap_vm_provision_bastion_user }}"
  delegate_to: "{{ sap_vm_provision_bastion_public_ip }}"
  ansible.builtin.wait_for:
    host: "{{ __sap_vm_provision_fact_private_ip }}"
    port: 22
    delay: 10
    sleep: 10
    timeout: 600
  when:
    - sap_vm_provision_bastion_execution
  vars:
    ansible_ssh_private_key_file: "{{ sap_vm_provision_ssh_host_private_key_file_path }}"
    ansible_ssh_common_args: "{{ sap_vm_provision_ssh_host_ssh_args }} {{ __sap_vm_provision_fact_ssh_args_bastion | d('') }}"

- name: SAP VM Provision - IBM PowerVM - Collect only facts about hardware
  remote_user: root
  become: true
  become_user: root
  delegate_to: "{{ __sap_vm_provision_fact_private_ip }}"
  delegate_facts: false
  ansible.builtin.setup:
    gather_subset:
      - hardware
  register: __sap_vm_provision_register_ansible_facts_host_disks_info
  vars:
    ansible_ssh_private_key_file: "{{ sap_vm_provision_ssh_host_private_key_file_path }}"
    ansible_ssh_common_args: "{{ sap_vm_provision_ssh_host_ssh_args }} {{ __sap_vm_provision_fact_ssh_args_bastion | d('') }}"


- name: SAP VM Provision - IBM PowerVM - Set fact for available storage volume device names
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_available_volumes: |-
      {% set volumes = [] %}
      {% set ansible_facts_devices_used_list = __sap_vm_provision_register_ansible_facts_host_disks_info.ansible_facts.ansible_device_links.ids.keys() | list %}
      {%- for letter in __sap_vm_provision_storage_vol_letters -%}
        {% for device in ansible_facts_devices_used_list -%}
          {% if '/dev/sd' + letter not in device -%}
            {% set dev = volumes.append('/dev/sd' + letter) %}
      {%- endif %}
      {%- endfor %}
      {% endfor %}
      {{ volumes | list | unique }}


# Combination of only the filesystem volume information from the host_specifications_dictionary
# for volume device assignment.
# This task assigns device names for each volume to be created.
- name: SAP VM Provision - IBM PowerVM - Set fact for target device map
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_filesystem_volume_map: |
      {% set volume_map = [] -%}
      {% set av_vol = __sap_vm_provision_fact_available_volumes -%}
      {% for storage_item in __sap_vm_provision_host_dict_spec.storage_definition -%}
        {% for idx in range(0, storage_item.disk_count | d(1)) -%}
          {% if (storage_item.filesystem_type is defined) -%}
            {% if ('swap' in storage_item.filesystem_type and storage_item.swap_path is not defined)
            or ('swap' not in storage_item.filesystem_type and storage_item.nfs_path is not defined) -%}
              {% set vol = volume_map.extend([
              {
                'definition_key': storage_item.name,
                'device': av_vol[0],
                'fstype': storage_item.filesystem_type | d('xfs'),
                'name': storage_item.name + idx|string,
                'size': storage_item.disk_size | d(0),
                'type': storage_item.disk_type | d('')
              }
              ]) %}
            {%- set _ = av_vol.pop(0) -%}
            {%- endif %}
          {%- endif %}
        {%- endfor %}
      {%- endfor %}
      {{ volume_map }}


# The volume creation task requires the above task to define the parameter
# which contains the calculated unique device names.
- name: SAP VM Provision - IBM PowerVM - Provision Virtual Disk volumes for IBM PowerVM VM filesystems
  openstack.cloud.volume:
    state: present
    name: "{{ inventory_hostname }}-vol_{{ vol_item.name }}"
    size: "{{ vol_item.size }}" # GB
    volume_type: "{{ sap_vm_provision_ibmpowervm_storage_template_name }}"
    is_multiattach: false
    is_bootable: false

    availability_zone: "{{ sap_vm_provision_ibmpowervm_host_group_name }}" # IBM PowerVM Hypervisor Cluster Host Group Name
    # region_name: "RegionOne"

    # Anti-Affinity, IBM PowerVC Collocation Rule (OpenStack Server Group ID) to provision VM to different hosts
    # www.ibm.com/docs/en/powervc/latest?topic=powervc-terminology
    # www.ibm.com/docs/en/powervc/latest?topic=powervc-collocation-rules
    # www.ibm.com/support/pages/powervc-anti-affinity-co-location-rules
    scheduler_hints:
      # same_host: "" # Affinity, Provision VM Virtual Disks to specific host
      # additional_properties:
      #   "drivers:multipath": "0"
      group: "{{ __placement_group }}"

    validate_certs: false # Allow Self-Signed Certificate
    auth: "{{ __sap_vm_provision_fact_ibmpowervm_openstack_auth }}"
  loop: "{{ __sap_vm_provision_fact_filesystem_volume_map }}"
  loop_control:
    loop_var: vol_item
    index_var: vol_item_index
    label: "{{ vol_item.definition_key }}: {{ vol_item.name }} (size: {{ vol_item.size }})"
  register: __sap_vm_provision_register_provision_host_single_volumes
  no_log: "{{ __sap_vm_provision_no_log }}"
  vars:
    __placement_group: "{{ (
      (__sap_vm_provision_register_ibmpowervm_collocation_rule.results | selectattr('item','==','hana'))[0].name
      if (sap_vm_provision_group_hana_primary in __sap_vm_provision_host_dict_spec.sap_host_type
        or sap_vm_provision_group_hana_secondary in __sap_vm_provision_host_dict_spec.sap_host_type)
      else
      (__sap_vm_provision_register_ibmpowervm_collocation_rule.results | selectattr('item','==','anydb'))[0].name
      if (sap_vm_provision_group_anydb_primary in __sap_vm_provision_host_dict_spec.sap_host_type
        or sap_vm_provision_group_anydb_secondary in __sap_vm_provision_host_dict_spec.sap_host_type)
      else
      (__sap_vm_provision_register_ibmpowervm_collocation_rule.results | selectattr('item','==','nwas'))[0].name
      if (sap_vm_provision_group_nwas_ascs in __sap_vm_provision_host_dict_spec.sap_host_type
        or sap_vm_provision_group_nwas_ers in __sap_vm_provision_host_dict_spec.sap_host_type)
      ) | d(omit) }}"
  when:
    - vol_item.fstype is defined
    - vol_item.size > 0

- name: SAP VM Provision - IBM PowerVM - Attach Virtual Disk volumes to the IBM PowerVM VM
  openstack.cloud.server_volume:
    state: present
    server: "{{ inventory_hostname }}"
    volume: "{{ virtual_disk_item.volume.id }}"
    validate_certs: false # Allow Self-Signed Certificate
    auth: "{{ __sap_vm_provision_fact_ibmpowervm_openstack_auth }}"
  loop: "{{ __sap_vm_provision_register_provision_host_single_volumes.results }}"
  loop_control:
    loop_var: virtual_disk_item
    index_var: virtual_disk_item_index
    label: "{{ virtual_disk_item.volume.name }}"
  register: __sap_vm_provision_register_provision_host_single_volume_attachments
  no_log: "{{ __sap_vm_provision_no_log }}"
  retries: 2
  delay: 5

- name: SAP VM Provision - IBM PowerVM - Re-scan IBM PowerVM VM SCSI Bus
  remote_user: root
  become: true
  become_user: root
  delegate_to: "{{ __sap_vm_provision_fact_private_ip }}"
  delegate_facts: false
  ansible.builtin.command:
    cmd: "/usr/bin/rescan-scsi-bus.sh"
  register: __sap_vm_provision_register_os_rescan_scsi_bus_output
  no_log: "{{ __sap_vm_provision_no_log }}"
  changed_when: __sap_vm_provision_register_os_rescan_scsi_bus_output.rc != 0
  vars:
    ansible_ssh_private_key_file: "{{ sap_vm_provision_ssh_host_private_key_file_path }}"
    ansible_ssh_common_args: "{{ sap_vm_provision_ssh_host_ssh_args }} {{ __sap_vm_provision_fact_ssh_args_bastion | d('') }}"

- name: SAP VM Provision - IBM PowerVM - Wait 10 seconds for the re-scan of IBM PowerVM VM SCSI Bus
  ansible.builtin.pause:
    seconds: 10
    prompt: ""


- name: SAP VM Provision - IBM PowerVM - Check VM status
  openstack.cloud.server_info:
    name: "{{ inventory_hostname }}"
    validate_certs: false # Allow Self-Signed Certificate
    auth: "{{ __sap_vm_provision_fact_ibmpowervm_openstack_auth }}"
  register: __sap_vm_provision_register_provision_host_single_info
  no_log: "{{ __sap_vm_provision_no_log }}"

# Note: openstack.cloud.server_info Ansible Module can provide:
# servers[0].metadata.original_host / servers[0].compute_host / servers[0].hypervisor_hostname for IBM PowerVM HMC System 'Machine Type Machine Serial' (MTMS)
# servers[0].instance_name for IBM PowerVM HMC 'Partition Name' of the Virtual Machine
# servers[0].vm_uuid for IBM PowerVM HMC 'Partition UUID' of the Virtual Machine
# servers[0].id for IBM PowerVC 'ID' of the Virtual Machine

- name: SAP VM Provision - IBM PowerVM - Combine details of provisioned hosts into one list
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_provisioned_hosts: "{{ __sap_vm_provision_fact_provisioned_hosts + [__merged_results] }}"
  # Append keys to provisioning result, that are not part of default return dictionary.
  vars:
    __merged_results:
      "{{ __sap_vm_provision_register_provision_host_single
        | combine({'host_node': inventory_hostname},
        {'sap_host_type': __sap_vm_provision_host_dict_spec.sap_host_type},
        {'sap_system_type': (__sap_vm_provision_host_dict_spec.sap_system_type | d(''))}) }}"
