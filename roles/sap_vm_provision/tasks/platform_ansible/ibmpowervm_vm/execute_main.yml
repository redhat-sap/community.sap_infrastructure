---

- name: Ansible Task block for looped provisioning of IBM PowerVM Virtual Machines
  any_errors_fatal: true
  block:

    # Method 1 for auth, set fact and reuse with validate_certs on each Ansible Task
    - name: SAP VM Provision - IBM PowerVM - Openstack Authentication - Method 1
      ansible.builtin.set_fact:
        __sap_vm_provision_fact_ibmpowervm_openstack_auth:
          auth_url: "{{ sap_vm_provision_ibmpowervm_vc_auth_endpoint }}"
          username: "{{ sap_vm_provision_ibmpowervm_vc_user }}"
          password: "{{ sap_vm_provision_ibmpowervm_vc_user_password }}"
          project_name: "{{ sap_vm_provision_ibmpowervm_vc_project_name }}"
          project_domain_name: "default" # If blank will cause error "Expecting to find domain in project"
          user_domain_name: "default" # If blank will cause error "Expecting to find domain in user"
      no_log: "{{ __sap_vm_provision_no_log }}"

    # Method 2 for auth, obtain token and subsequently set each task with environment
    # e.g. OS_TOKEN: "{{ __sap_vm_provision_register_ibmpowervm_openstack_session.auth_token }}"
    # Use if requiring direct API call or CLI commands
    # - name: SAP VM Provision - IBM PowerVM - Openstack Authentication - Method 2
    #   no_log: "{{ __sap_vm_provision_no_log }}"
    #   register: __sap_vm_provision_register_ibmpowervm_openstack_session
    #   openstack.cloud.auth:
    #     auth:
    #       auth_url: "{{ sap_vm_provision_ibmpowervm_vc_auth_endpoint }}"
    #       username: "{{ sap_vm_provision_ibmpowervm_vc_user }}"
    #       password: "{{ sap_vm_provision_ibmpowervm_vc_user_password }}"
    #       project_name: "{{ sap_vm_provision_ibmpowervm_vc_project_name }}"
    #       project_domain_name: "default" # If blank will cause error "Expecting to find domain in project"
    #       user_domain_name: "default" # If blank will cause error "Expecting to find domain in user"
    #     interface: internal # internal, public, admin
    #     validate_certs: false # Allow Self-Signed Certificate
    #     wait: true
    #   when: __sap_vm_provision_fact_ibmpowervm_openstack_auth is undefined or not __sap_vm_provision_fact_ibmpowervm_openstack_auth


    - name: SAP VM Provision - IBM PowerVM - Create IBM PowerVM SSH Key Pair
      openstack.cloud.keypair:
        state: present
        name: "{{ sap_vm_provision_ibmpowervm_key_pair_name_ssh_host_public_key }}"
        public_key: "{{ lookup('ansible.builtin.file', sap_vm_provision_ssh_host_public_key_file_path) }}"
        validate_certs: false # Allow Self-Signed Certificate
        auth: "{{ __sap_vm_provision_fact_ibmpowervm_openstack_auth }}"
      register: __sap_vm_provision_register_ibmpowervm_ssh_public_key
      no_log: "{{ __sap_vm_provision_no_log }}"
      throttle: 1

    - name: SAP VM Provision - IBM PowerVM - Create Collocation Rules when High Availability
      openstack.cloud.server_group:
        name: "{{ sap_vm_provision_ibmpowervm_placement_resource_name }}-{{ placement_item }}"
        policy: anti-affinity
        # region_name: "RegionOne"
        validate_certs: false # Allow Self-Signed Certificate
        auth: "{{ __sap_vm_provision_fact_ibmpowervm_openstack_auth }}"
      loop: "{{
        ['hana' if sap_vm_provision_group_hana_secondary in (__sap_vm_provision_host_dict_plan.values() | map(attribute='sap_host_type') | list) else '',
          'anydb' if sap_vm_provision_group_anydb_secondary in (__sap_vm_provision_host_dict_plan.values() | map(attribute='sap_host_type') | list) else '',
          'nwas' if sap_vm_provision_group_nwas_ers in (__sap_vm_provision_host_dict_plan.values() | map(attribute='sap_host_type') | list) else '']
          | select | list }}"
      loop_control:
        loop_var: placement_item
      register: __sap_vm_provision_register_ibmpowervm_collocation_rule
      no_log: "{{ __sap_vm_provision_no_log }}"
      run_once: true
      when:
        - sap_vm_provision_ibmcloud_placement_resource_name | d('') | length > 0
        - sap_vm_provision_ibmcloud_placement_strategy_spread
        - not placement_item == ''

    - name: SAP VM Provision - IBM PowerVM - Provision hosts to IBM PowerVM
      ansible.builtin.include_tasks:
        file: "{{ __sap_vm_provision_task_file }}/execute_provision.yml"
      vars:
        __sap_vm_provision_fact_ibmpowervm_openstack_auth_delegate:
          "{{ __sap_vm_provision_fact_ibmpowervm_openstack_auth }}"

    - name: SAP VM Provision - IBM PowerVM - Set fact when using Bastion SSH Proxy connection from Ansible control node to target node/s
      ansible.builtin.set_fact:
        __sap_vm_provision_fact_ssh_args_bastion: >-
          -o ProxyCommand='ssh -W %h:%p {{ sap_vm_provision_bastion_user }}@{{ sap_vm_provision_bastion_public_ip }}
          -p {{ sap_vm_provision_bastion_ssh_port }}
          -i {{ sap_vm_provision_ssh_bastion_private_key_file_path }}
          {{ sap_vm_provision_ssh_bastion_ssh_args }}'
      when:
        - sap_vm_provision_bastion_execution
        - sap_vm_provision_bastion_user | d('') != ''
        - sap_vm_provision_bastion_public_ip | d('') != ''
        - sap_vm_provision_bastion_ssh_port | d('') != ''
        - sap_vm_provision_ssh_bastion_private_key_file_path | d('') != ''

    - name: SAP VM Provision - IBM PowerVM - Add hosts provisioned to the Ansible Inventory
      ansible.builtin.add_host:
        name: "{{ add_item[0].host_node }}"
        groups: "{{ add_item[0].sap_system_type + '_' if (add_item[0].sap_system_type != '') }}{{ add_item[0].sap_host_type }}"
        ansible_host: "{{ add_item[0].access_ipv4 }}"
        ansible_user: "root"
        ansible_ssh_private_key_file: "{{ sap_vm_provision_ssh_host_private_key_file_path }}"
        ansible_ssh_common_args: "{{ sap_vm_provision_ssh_host_ssh_args }} {{ __sap_vm_provision_fact_ssh_args_bastion | d('') }}"
      loop: "{{ ansible_play_hosts | map('extract', hostvars, '__sap_vm_provision_fact_provisioned_hosts') }}"
      loop_control:
        label: "{{ add_item[0].host_node }}"
        loop_var: add_item
      register: __sap_vm_provision_register_provision_host_all_add
      no_log: "{{ __sap_vm_provision_no_log }}"


    - name: SAP VM Provision - IBM PowerVM - Set fact to hold all inventory hosts in all groups
      ansible.builtin.set_fact:
        __sap_vm_provision_fact_merged_hosts_list: "{{
            [[groups[sap_vm_provision_group_hana_primary] | d([])],
            [groups[sap_vm_provision_group_hana_secondary] | d([])],
            [groups[sap_vm_provision_group_anydb_primary] | d([])],
            [groups[sap_vm_provision_group_anydb_secondary] | d([])],
            [groups[sap_vm_provision_group_nwas_ascs] | d([])],
            [groups[sap_vm_provision_group_nwas_ers] | d([])],
            [groups[sap_vm_provision_group_nwas_pas] | d([])],
            [groups[sap_vm_provision_group_nwas_aas] | d([])]] | flatten | select() }}"


    - name: SAP VM Provision - IBM PowerVM - Identify hosts
      ansible.builtin.include_tasks:
        file: common/identify_hosts.yml

    - name: SAP VM Provision - IBM PowerVM - Set Ansible Vars
      ansible.builtin.include_tasks:
        file: common/set_ansible_vars.yml

  rescue:
    # This requires no_log set on each Ansible Task, and not set on the Ansible Task Block
    # This requires an Ansible Task Block containing the Ansible Tasks for calling
    # Infrastructure Platform APIs (via Ansible Modules)
    - name: SAP VM Provision - IBM PowerVM - Show errors in task outputs
      ansible.builtin.fail:
        msg: "{{ lookup('ansible.builtin.vars', loop_item) }}"
      loop:
        # Main
        - __sap_vm_provision_register_ibmpowervm_ssh_public_key
        - __sap_vm_provision_register_ibmpowervm_collocation_rule
        - __sap_vm_provision_register_provision_host_all_add
        # Provision
        - __sap_vm_provision_register_provision_host_single_check_exists
        - __sap_vm_provision_register_ibmpowervm_os_image_info
        - __sap_vm_provision_register_ibmpowervm_network
        - __sap_vm_provision_register_ibmpowervm_compute_template
        - __sap_vm_provision_register_provision_host_single
        - __sap_vm_provision_register_provision_host_single_vnic
        - __sap_vm_provision_register_ansible_facts_host_disks_info
        - __sap_vm_provision_register_provision_host_single_volumes
        - __sap_vm_provision_register_provision_host_single_volume_attachments
        - __sap_vm_provision_register_os_rescan_scsi_bus_output
        - __sap_vm_provision_register_provision_host_single_info
      loop_control:
        loop_var: loop_item
        index_var: loop_item_index
        label: "{{ 'Variable No. ' + (loop_item_index | string) }}"
      when:
        - lookup('ansible.builtin.vars', loop_item, default='') | length > 0
        - not lookup('ansible.builtin.vars', loop_item, default='') is skipped
        - lookup('ansible.builtin.vars', loop_item, default='') is failed

    - name: SAP VM Provision - IBM PowerVM - Fail if provisioning failed
      ansible.builtin.fail:
        msg: |
          FAIL: Provisioning has failed during one of tasks not producing registered output.
          You can investigate failure in tasks above or by:
          - Increasing verbosity
          - Setting the variable '__sap_vm_provision_no_log' to 'false'


- name: Ansible Task block to execute on target inventory hosts
  delegate_to: "{{ inventory_hostname }}"
  block:

    # Required to collect the remote host's facts for further processing in the following steps.
    # Collected facts can be used for all conditional tasks on provisioned hosts like ansible_facts['os_family'].
    - name: SAP VM Provision - IBM PowerVM - Gather host facts
      ansible.builtin.setup:

    # Must be set to short hostname,
    # so that command 'hostname' and 'hostname -s' return the short hostname only;
    # otherwise may cause error with SAP SWPM using name.domain.com.domain.com
    - name: SAP VM Provision - IBM PowerVM - Change system hostname (must be set to short name and not FQDN, as required by SAP)
      ansible.builtin.hostname:
        name: "{{ inventory_hostname_short }}"

    - name: SAP VM Provision - IBM PowerVM - Set /etc/hosts
      ansible.builtin.include_tasks:
        file: common/set_etc_hosts.yml

    - name: SAP VM Provision - IBM PowerVM - Set /etc/hosts for HA
      ansible.builtin.include_tasks:
        file: common/set_etc_hosts_ha.yml
      when:
        - __sap_vm_provision_fact_is_ha_hana or __sap_vm_provision_fact_is_ha_anydb or __sap_vm_provision_fact_is_ha_nwas_ers

    - name: SAP VM Provision - IBM PowerVM - Set /etc/hosts for Scale-Out
      ansible.builtin.include_tasks:
        file: common/set_etc_hosts_scaleout.yml
      when: __sap_vm_provision_fact_is_hana_scaleout

    - name: SAP VM Provision - IBM PowerVM - Set vars for sap_storage_setup Ansible Role
      ansible.builtin.include_tasks:
        file: common/set_ansible_vars_storage.yml

    - name: SAP VM Provision - IBM PowerVM - Register Web Forward Proxy
      ansible.builtin.include_tasks:
        file: common/register_proxy.yml

    - name: SAP VM Provision - IBM PowerVM - Register Package Repositories
      ansible.builtin.include_tasks:
        file: common/register_os.yml
