---

# When SAP HANA Scale-Out is used, if host name is not in original specifications then strip suffix node number from host name
- name: SAP VM Provision - VMware - Set host spec for SAP HANA Scale-Out
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_scaleout_origin_hostname: "{{ inventory_hostname | regex_replace('^(.+?)\\d*$', '\\1') }}"
  when:
    - sap_vm_provision_calculate_sap_hana_scaleout_active_coordinator is defined
    - not inventory_hostname in __sap_vm_provision_host_dict_plan.keys()

- name: SAP VM Provision - VMware - Identify VM Folder
  vmware.vmware_rest.vcenter_folder_info:
    names: "{{ sap_vm_provision_vmware_vm_folder_name }}"
    type: VIRTUAL_MACHINE
    # Hypervisor Control Plane credentials
    vcenter_hostname: "{{ sap_vm_provision_vmware_vcenter_hostname | d(lookup('env', 'VMWARE_HOST')) | d(omit) }}"
    vcenter_validate_certs: "{{ (sap_vm_provision_vmware_vcenter_validate_certs_bool | d(lookup('env', 'VMWARE_VALIDATE_CERTS'))) | bool | d(false) }}"
    vcenter_username: "{{ sap_vm_provision_vmware_vcenter_user | d(lookup('env', 'VMWARE_USER')) | d(omit) }}"
    vcenter_password: "{{ sap_vm_provision_vmware_vcenter_password | d(lookup('env', 'VMWARE_PASSWORD')) | d(omit) }}"
  register: __sap_vm_provision_register_vmware_vm_folder
  no_log: "{{ __sap_vm_provision_no_log }}"

- name: SAP VM Provision - VMware - Identify Datacenter Cluster
  vmware.vmware_rest.vcenter_cluster_info:
    names: "{{ sap_vm_provision_vmware_vm_cluster_name }}"
    # Hypervisor Control Plane credentials
    vcenter_hostname: "{{ sap_vm_provision_vmware_vcenter_hostname | d(lookup('env', 'VMWARE_HOST')) | d(omit) }}"
    vcenter_validate_certs: "{{ (sap_vm_provision_vmware_vcenter_validate_certs_bool | d(lookup('env', 'VMWARE_VALIDATE_CERTS'))) | bool | d(false) }}"
    vcenter_username: "{{ sap_vm_provision_vmware_vcenter_user | d(lookup('env', 'VMWARE_USER')) | d(omit) }}"
    vcenter_password: "{{ sap_vm_provision_vmware_vcenter_password | d(lookup('env', 'VMWARE_PASSWORD')) | d(omit) }}"
  register: __sap_vm_provision_register_vmware_vm_cluster
  no_log: "{{ __sap_vm_provision_no_log }}"

- name: SAP VM Provision - VMware - Identify Host in Datacenter Cluster
  vmware.vmware_rest.vcenter_host_info:
    names: "{{ sap_vm_provision_vmware_vm_cluster_host_name }}"
    # Hypervisor Control Plane credentials
    vcenter_hostname: "{{ sap_vm_provision_vmware_vcenter_hostname | d(lookup('env', 'VMWARE_HOST')) | d(omit) }}"
    vcenter_validate_certs: "{{ (sap_vm_provision_vmware_vcenter_validate_certs_bool | d(lookup('env', 'VMWARE_VALIDATE_CERTS'))) | bool | d(false) }}"
    vcenter_username: "{{ sap_vm_provision_vmware_vcenter_user | d(lookup('env', 'VMWARE_USER')) | d(omit) }}"
    vcenter_password: "{{ sap_vm_provision_vmware_vcenter_password | d(lookup('env', 'VMWARE_PASSWORD')) | d(omit) }}"
  register: __sap_vm_provision_register_vmware_vm_cluster_host
  no_log: "{{ __sap_vm_provision_no_log }}"

- name: SAP VM Provision - VMware - Identify Datastore
  no_log: "{{ __sap_vm_provision_no_log }}"
  register: __sap_vm_provision_register_vmware_vm_cluster_datastore
  vmware.vmware_rest.vcenter_datastore_info:
    names: "{{ sap_vm_provision_vmware_vm_cluster_datastore_name }}"
    # Hypervisor Control Plane credentials
    vcenter_hostname: "{{ sap_vm_provision_vmware_vcenter_hostname | d(lookup('env', 'VMWARE_HOST')) | d(omit) }}"
    vcenter_validate_certs: "{{ (sap_vm_provision_vmware_vcenter_validate_certs_bool | d(lookup('env', 'VMWARE_VALIDATE_CERTS'))) | bool | d(false) }}"
    vcenter_username: "{{ sap_vm_provision_vmware_vcenter_user | d(lookup('env', 'VMWARE_USER')) | d(omit) }}"
    vcenter_password: "{{ sap_vm_provision_vmware_vcenter_password | d(lookup('env', 'VMWARE_PASSWORD')) | d(omit) }}"

- name: SAP VM Provision - VMware - Identify Content Library (to store VM Template)
  vmware.vmware_rest.content_locallibrary:
    name: "{{ sap_vm_provision_vmware_vm_content_library_name }}"
    # Hypervisor Control Plane credentials
    vcenter_hostname: "{{ sap_vm_provision_vmware_vcenter_hostname | d(lookup('env', 'VMWARE_HOST')) | d(omit) }}"
    vcenter_validate_certs: "{{ (sap_vm_provision_vmware_vcenter_validate_certs_bool | d(lookup('env', 'VMWARE_VALIDATE_CERTS'))) | bool | d(false) }}"
    vcenter_username: "{{ sap_vm_provision_vmware_vcenter_user | d(lookup('env', 'VMWARE_USER')) | d(omit) }}"
    vcenter_password: "{{ sap_vm_provision_vmware_vcenter_password | d(lookup('env', 'VMWARE_PASSWORD')) | d(omit) }}"
  register: __sap_vm_provision_register_vmware_vm_content_library
  no_log: "{{ __sap_vm_provision_no_log }}"

- name: SAP VM Provision - VMware - List all items in Content Library
  vmware.vmware_rest.content_library_item_info:
    library_id: "{{ __sap_vm_provision_register_vmware_vm_content_library.id }}"
    # Hypervisor Control Plane credentials
    vcenter_hostname: "{{ sap_vm_provision_vmware_vcenter_hostname | d(lookup('env', 'VMWARE_HOST')) | d(omit) }}"
    vcenter_validate_certs: "{{ (sap_vm_provision_vmware_vcenter_validate_certs_bool | d(lookup('env', 'VMWARE_VALIDATE_CERTS'))) | bool | d(false) }}"
    vcenter_username: "{{ sap_vm_provision_vmware_vcenter_user | d(lookup('env', 'VMWARE_USER')) | d(omit) }}"
    vcenter_password: "{{ sap_vm_provision_vmware_vcenter_password | d(lookup('env', 'VMWARE_PASSWORD')) | d(omit) }}"
  register: __sap_vm_provision_register_vmware_vm_content_library_items
  no_log: "{{ __sap_vm_provision_no_log }}"

- name: SAP VM Provision - VMware - Identify VMware Template ID
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_vmware_vm_template_id:
      "{{ (__sap_vm_provision_register_vmware_vm_content_library_items.value
        | selectattr('type', '==', 'vm-template')
        | selectattr('name', '==', sap_vm_provision_vmware_vm_template_name) | first).id }}"

- name: SAP VM Provision - VMware - Check if VM exists
  vmware.vmware_rest.vcenter_vm_info:
    names: "{{ inventory_hostname }}"
    # Hypervisor Control Plane credentials
    vcenter_hostname: "{{ sap_vm_provision_vmware_vcenter_hostname | d(lookup('env', 'VMWARE_HOST')) | d(omit) }}"
    vcenter_validate_certs: "{{ (sap_vm_provision_vmware_vcenter_validate_certs_bool | d(lookup('env', 'VMWARE_VALIDATE_CERTS'))) | bool | d(false) }}"
    vcenter_username: "{{ sap_vm_provision_vmware_vcenter_user | d(lookup('env', 'VMWARE_USER')) | d(omit) }}"
    vcenter_password: "{{ sap_vm_provision_vmware_vcenter_password | d(lookup('env', 'VMWARE_PASSWORD')) | d(omit) }}"
  register: __sap_vm_provision_register_provision_host_single_check_exists
  no_log: "{{ __sap_vm_provision_no_log }}"

- name: SAP VM Provision - VMware - Set VM ID
  when: not __sap_vm_provision_register_provision_host_single_check_exists.value | length == 0
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_vmware_vm_cluster_host_id:
      "{{ __sap_vm_provision_register_provision_host_single_check_exists.value[0].vm }}" # VM ID

- name: SAP VM Provision - VMware - Check VM status
  vmware.vmware_rest.vcenter_vm:
    vm: "{{ __sap_vm_provision_fact_vmware_vm_cluster_host_id }}" # VM ID
    # Hypervisor Control Plane credentials
    vcenter_hostname: "{{ sap_vm_provision_vmware_vcenter_hostname | d(lookup('env', 'VMWARE_HOST')) | d(omit) }}"
    vcenter_validate_certs: "{{ (sap_vm_provision_vmware_vcenter_validate_certs_bool | d(lookup('env', 'VMWARE_VALIDATE_CERTS'))) | bool | d(false) }}"
    vcenter_username: "{{ sap_vm_provision_vmware_vcenter_user | d(lookup('env', 'VMWARE_USER')) | d(omit) }}"
    vcenter_password: "{{ sap_vm_provision_vmware_vcenter_password | d(lookup('env', 'VMWARE_PASSWORD')) | d(omit) }}"
  register: __sap_vm_provision_register_provision_host_single_info
  no_log: "{{ __sap_vm_provision_no_log }}"
  when: not __sap_vm_provision_register_provision_host_single_check_exists.value | length == 0

- name: Block that provisions the VM
  when: __sap_vm_provision_register_provision_host_single_check_exists.value | length == 0
  block:

    # Deploy a Virtual Machine from a VM Template in a Content Library
    # Doc: https://docs.vmware.com/en/VMware-vSphere/7.0/com.vmware.vsphere.vm_admin.doc/GUID-6EA309BC-9113-449C-B668-ACBB363485C3.html
    - name: SAP VM Provision - VMware - Provision VMware Virtual Machine based upon the VM Template
      vmware.vmware_rest.vcenter_vmtemplate_libraryitems:

        ## Virtual Machine target Hypervisor definition
        placement:
          folder: "{{ (__sap_vm_provision_register_vmware_vm_folder.value | first).folder }}"
          # resource_pool: ""
          cluster: "{{ (__sap_vm_provision_register_vmware_vm_cluster.value | first).cluster }}"
          host: "{{ (__sap_vm_provision_register_vmware_vm_cluster_host.value | first).host }}"

        ## Virtual Machine clone from VM Template definition
        # ID of the Content Library Item with the source VM Template (not OVF) to be cloned and deployed
        template_library_item: '{{ __sap_vm_provision_fact_vmware_vm_template_id }}'
        state: deploy # Deploy the VM Template defined in template_library_item
        powered_on: false # Power on after VM Template is cloned and deployed
        session_timeout: 600 # 10 minutes

        ## Virtual Machine definition
        name: "{{ inventory_hostname }}"
        description: "{{ inventory_hostname }} created by Ansible Playbook for SAP"

        ## Virtual Machine main resources definition
        ## May cause conflict with powered_on parameter
        hardware_customization:
          cpu_update:
            num_cpus: "{{ target_provision_host_spec.vmware_vm_cpu_threads }}"
            num_cores_per_socket: "{{ target_provision_host_spec.vmware_vm_cpu_smt }}"
          memory_update:
            memory: "{{ (target_provision_host_spec.vmware_vm_memory_gib | int) * 1024 }}" # MiB
          # nics:

        ## Virtual Machine Storage configuration
        ## Boot Disk will be loaded to this datastore
        disk_storage:
          datastore: "{{ (__sap_vm_provision_register_vmware_vm_cluster_datastore.value | first).datastore }}"
          # storage_policy:

        ## Hypervisor Control Plane credentials
        vcenter_hostname: "{{ sap_vm_provision_vmware_vcenter_hostname | d(lookup('env', 'VMWARE_HOST')) | d(omit) }}"
        vcenter_validate_certs: "{{ (sap_vm_provision_vmware_vcenter_validate_certs_bool | d(lookup('env', 'VMWARE_VALIDATE_CERTS'))) | bool | d(false) }}"
        vcenter_username: "{{ sap_vm_provision_vmware_vcenter_user | d(lookup('env', 'VMWARE_USER')) | d(omit) }}"
        vcenter_password: "{{ sap_vm_provision_vmware_vcenter_password | d(lookup('env', 'VMWARE_PASSWORD')) | d(omit) }}"

      register: __sap_vm_provision_register_provision_host_single
      no_log: "{{ __sap_vm_provision_no_log }}"
      # # Report VM back only after it is done creating the clone image.
      # until: __sap_vm_provision_register_provision_host_single.vm.status != "image_locked"
      # retries: 120
      # delay: 5


- name: SAP VM Provision - VMware - Set VM ID
  when: __sap_vm_provision_register_provision_host_single_check_exists.value | length == 0
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_vmware_vm_cluster_host_id:
      "{{ __sap_vm_provision_register_provision_host_single.value }}" # Returned from VM provision


- name: SAP VM Provision - VMware - Check VM status
  vmware.vmware_rest.vcenter_vm:
    vm: "{{ __sap_vm_provision_fact_vmware_vm_cluster_host_id }}"
    # Hypervisor Control Plane credentials
    vcenter_hostname: "{{ sap_vm_provision_vmware_vcenter_hostname | d(lookup('env', 'VMWARE_HOST')) | d(omit) }}"
    vcenter_validate_certs: "{{ (sap_vm_provision_vmware_vcenter_validate_certs_bool | d(lookup('env', 'VMWARE_VALIDATE_CERTS'))) | bool | d(false) }}"
    vcenter_username: "{{ sap_vm_provision_vmware_vcenter_user | d(lookup('env', 'VMWARE_USER')) | d(omit) }}"
    vcenter_password: "{{ sap_vm_provision_vmware_vcenter_password | d(lookup('env', 'VMWARE_PASSWORD')) | d(omit) }}"
  register: __sap_vm_provision_register_provision_host_single_info
  no_log: "{{ __sap_vm_provision_no_log }}"


# Example https://cloudinit.readthedocs.io/en/23.4.1/reference/datasources/vmware.html#walkthrough-of-guestinfo-keys-transport
# Docs https://developer.vmware.com/docs/18555/GUID-75E27FA9-2E40-4CBF-BF3D-22DCFC8F11F7.html
# >> The instance-id key is required. All other keys are optional.
- name: SAP VM Provision - VMware - Set cloud-init variables for customization specification
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_vmware_vm_metadata_yaml:
      instance-id: "{{ inventory_hostname }}"
      hostname: "{{ inventory_hostname }}"
      local-hostname: "{{ inventory_hostname }}"
      network:
        version: 2
        ethernets:
          nics:
            match:
              name: e*
            dhcp4: true
            dhcp6: false
      public_ssh_keys:
        - "{{ lookup('ansible.builtin.file', sap_vm_provision_ssh_host_public_key_file_path) }}"

    __sap_vm_provision_fact_vmware_vm_userdata_yaml_text: |
      #cloud-config

      hostname: {{ inventory_hostname }}
      fqdn: {{ inventory_hostname }}.{{ sap_vm_provision_dns_root_domain }}

      # timezone: "Etc/UTC"

      # Ensure root login is enabled
      disable_root: false

      # Ensure SSH password authentication is disabled for all users
      ssh_pwauth: false

      # Ensure all existing SSH Keys are removed from host
      ssh_deletekeys: true

      # By default, (most) ssh host keys are printed to the console
      # Set emit_keys_to_console to false suppresses this output
      ssh:
        emit_keys_to_console: false

      # By default, the fingerprints of the authorized keys for the users
      # cloud-init adds are printed to the console. Setting
      # no_ssh_fingerprints to true suppresses this output
      no_ssh_fingerprints: false

      # For first user in the cloud-init configuration, set the SSH Public Key
      ssh_authorized_keys:
        - {{ lookup('ansible.builtin.file', sap_vm_provision_ssh_host_public_key_file_path) }}

      # Add entry to /root/.ssh/authorized_keys
      # Do not lock password once access to host, however password authentication for SSH remains disabled
      # Ensure SSH password authentication is disabled for root by 'ssh_pwauth' config
      users:
        - name: root
          ssh_authorized_keys:
            - {{ lookup('ansible.builtin.file', sap_vm_provision_ssh_host_public_key_file_path) }}
          lock_passwd: false

      # After first boot of the VMware VM Template, disable cloud-init from running again
      write_files:
        - path: /etc/cloud/cloud-init.disabled
          permissions: "0644"
          content: ""

  when:
    - __sap_vm_provision_register_provision_host_single_info.value.power_state is defined
    - __sap_vm_provision_register_provision_host_single_info.value.power_state != "POWERED_ON"


# Doc 1 https://developer.vmware.com/apis/vsphere-automation/latest/vcenter/api/vcenter/vm/vm/guest/customization/put/
# Doc 2 https://developer.vmware.com/docs/18555/GUID-75E27FA9-2E40-4CBF-BF3D-22DCFC8F11F7.html
# >> metadata as JSON/YAML, userdata as no compression or base64 encoding
# Error 400 com.vmware.vapi.std.errors.not_allowed_in_current_state : if the virtual machine vm is not in a powered off state.
- name: SAP VM Provision - VMware - Apply customization specification to the VM in Powered Off state
  vmware.vmware_rest.vcenter_vm_guest_customization:
    vm: '{{ __sap_vm_provision_fact_vmware_vm_cluster_host_id }}'
    configuration_spec:
      cloud_config:
        type: CLOUDINIT
        cloudinit:
          metadata: "{{ __sap_vm_provision_fact_vmware_vm_metadata_yaml | to_json(ensure_ascii=true) }}"
          userdata: "{{ __sap_vm_provision_fact_vmware_vm_userdata_yaml_text | trim }}" # remove last newline character
      # linux_config:
    interfaces: []
    global_DNS_settings: {}
    # Hypervisor Control Plane credentials
    vcenter_hostname: "{{ sap_vm_provision_vmware_vcenter_hostname | d(lookup('env', 'VMWARE_HOST')) | d(omit) }}"
    vcenter_validate_certs: "{{ (sap_vm_provision_vmware_vcenter_validate_certs_bool | d(lookup('env', 'VMWARE_VALIDATE_CERTS'))) | bool | d(false) }}"
    vcenter_username: "{{ sap_vm_provision_vmware_vcenter_user | d(lookup('env', 'VMWARE_USER')) | d(omit) }}"
    vcenter_password: "{{ sap_vm_provision_vmware_vcenter_password | d(lookup('env', 'VMWARE_PASSWORD')) | d(omit) }}"
  register: __sap_vm_provision_register_vmware_vm_guest_customization
  no_log: "{{ __sap_vm_provision_no_log }}"
  when:
    - __sap_vm_provision_register_provision_host_single_info.value.power_state is defined
    - __sap_vm_provision_register_provision_host_single_info.value.power_state != "POWERED_ON"


- name: SAP VM Provision - VMware - Ensure VM is Powered ON
  vmware.vmware_rest.vcenter_vm_power:
    state: start
    vm: "{{ __sap_vm_provision_fact_vmware_vm_cluster_host_id }}"
    # Hypervisor Control Plane credentials
    vcenter_hostname: "{{ sap_vm_provision_vmware_vcenter_hostname | d(lookup('env', 'VMWARE_HOST')) | d(omit) }}"
    vcenter_validate_certs: "{{ (sap_vm_provision_vmware_vcenter_validate_certs_bool | d(lookup('env', 'VMWARE_VALIDATE_CERTS'))) | bool | d(false) }}"
    vcenter_username: "{{ sap_vm_provision_vmware_vcenter_user | d(lookup('env', 'VMWARE_USER')) | d(omit) }}"
    vcenter_password: "{{ sap_vm_provision_vmware_vcenter_password | d(lookup('env', 'VMWARE_PASSWORD')) | d(omit) }}"
  register: __sap_vm_provision_register_vmware_vm_power_info
  no_log: "{{ __sap_vm_provision_no_log }}"
  # Wait until VM is powered on
  until:
    - __sap_vm_provision_register_vmware_vm_power_info.value.error_type is defined
    - __sap_vm_provision_register_vmware_vm_power_info.value.error_type == "ALREADY_IN_DESIRED_STATE"
  retries: 15
  delay: 60

- name: SAP VM Provision - VMware - Show VM Information
  vmware.vmware_rest.vcenter_vm_info:
    vm: '{{ __sap_vm_provision_fact_vmware_vm_cluster_host_id }}'
    # Hypervisor Control Plane credentials
    vcenter_hostname: "{{ sap_vm_provision_vmware_vcenter_hostname | d(lookup('env', 'VMWARE_HOST')) | d(omit) }}"
    vcenter_validate_certs: "{{ (sap_vm_provision_vmware_vcenter_validate_certs_bool | d(lookup('env', 'VMWARE_VALIDATE_CERTS'))) | bool | d(false) }}"
    vcenter_username: "{{ sap_vm_provision_vmware_vcenter_user | d(lookup('env', 'VMWARE_USER')) | d(omit) }}"
    vcenter_password: "{{ sap_vm_provision_vmware_vcenter_password | d(lookup('env', 'VMWARE_PASSWORD')) | d(omit) }}"
  register: __sap_vm_provision_register_vmware_vm_info
  no_log: "{{ __sap_vm_provision_no_log }}"
  # Wait until VM is powered on
  until: __sap_vm_provision_register_vmware_vm_info.value.power_state == "POWERED_ON"
  retries: 45
  delay: 20

- name: SAP VM Provision - VMware - Get guest networking information (wait until DHCP assigns IP Address for host)
  vmware.vmware_rest.vcenter_vm_guest_networking_interfaces_info:
    vm: '{{ __sap_vm_provision_fact_vmware_vm_cluster_host_id }}'
    # Hypervisor Control Plane credentials
    vcenter_hostname: "{{ sap_vm_provision_vmware_vcenter_hostname | d(lookup('env', 'VMWARE_HOST')) | d(omit) }}"
    vcenter_validate_certs: "{{ (sap_vm_provision_vmware_vcenter_validate_certs_bool | d(lookup('env', 'VMWARE_VALIDATE_CERTS'))) | bool | d(false) }}"
    vcenter_username: "{{ sap_vm_provision_vmware_vcenter_user | d(lookup('env', 'VMWARE_USER')) | d(omit) }}"
    vcenter_password: "{{ sap_vm_provision_vmware_vcenter_password | d(lookup('env', 'VMWARE_PASSWORD')) | d(omit) }}"
  register: __sap_vm_provision_register_vmware_vm_nic_info
  no_log: "{{ __sap_vm_provision_no_log }}"
  # Wait until VM Tools is running
  until:
    - __sap_vm_provision_register_vmware_vm_nic_info.value.error_type | d("")) != "SERVICE_UNAVAILABLE"
    - __sap_vm_provision_register_vmware_vm_nic_info.value[0].ip.ip_addresses | length > 0
  retries: 45
  delay: 20


# Use IP Address from the preferred vNIC
- name: SAP VM Provision - VMware - Create fact for delegate host IP
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_private_ip:
      "{{ ((__sap_vm_provision_register_vmware_vm_nic_info.value | map(attribute='ip.ip_addresses'))
        | flatten | selectattr('state', '==', 'PREFERRED') | first).ip_address }}"


- name: SAP VM Provision - VMware - Copy facts to delegate host - when using Bastion SSH Proxy connection from Ansible control node to target node/s
  delegate_to: "{{ __sap_vm_provision_fact_private_ip }}"
  delegate_facts: true
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_ssh_args_bastion: >-
      -o ProxyCommand='ssh -W %h:%p {{ sap_vm_provision_bastion_user }}@{{ sap_vm_provision_bastion_public_ip }}
      -p {{ sap_vm_provision_bastion_ssh_port }}
      -i {{ sap_vm_provision_ssh_bastion_private_key_file_path }}
      {{ sap_vm_provision_ssh_bastion_ssh_args }}'
  when:
    - sap_vm_provision_bastion_execution
    - sap_vm_provision_bastion_user | d('') != ''
    - sap_vm_provision_bastion_public_ip | d('') != ''
    - sap_vm_provision_bastion_ssh_port | d('') != ''
    - sap_vm_provision_ssh_bastion_private_key_file_path | d('') != ''


- name: SAP VM Provision - VMware - Collect only facts about hardware and network
  remote_user: root
  become: true
  become_user: root
  delegate_to: "{{ __sap_vm_provision_fact_private_ip }}"
  delegate_facts: false
  ansible.builtin.setup:
    gather_subset:
      - hardware
      - default_ipv4
      - network
  register: __sap_vm_provision_register_gather_subset
  vars:
    ansible_ssh_private_key_file: "{{ sap_vm_provision_ssh_host_private_key_file_path }}"
    ansible_ssh_common_args: "{{ sap_vm_provision_ssh_host_ssh_args }} {{ __sap_vm_provision_fact_ssh_args_bastion | d('') }}"


- name: SAP VM Provision - VMware - Set fact for available storage volume device names
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_available_volumes: |-
      {% set ansible_facts_devices_used_list = __sap_vm_provision_register_gather_subset.ansible_facts.ansible_device_links.ids.keys() | list %}
      {% set volumes = [] %}
      {%- for letter in __sap_vm_provision_storage_vol_letters -%}
        {% for device in ansible_facts_devices_used_list -%}
          {% if '/dev/sd' + letter not in device -%}
            {% set dev = volumes.append('/dev/sd' + letter) %}
      {%- endif %}
      {%- endfor %}
      {% endfor %}
      {{ volumes | list | unique }}


# Combination of only the filesystem volume information from the host_specifications_dictionary
# for volume device assignment.
# This task assigns device names for each volume to be created.
- name: SAP VM Provision - VMware - Set fact for target device map
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_filesystem_volume_map: |
      {% set volume_map = [] -%}
      {% set av_vol = __sap_vm_provision_fact_available_volumes -%}
      {% for storage_item in target_provision_host_spec.storage_definition -%}
        {% for idx in range(0, storage_item.disk_count | d(1)) -%}
          {% if (storage_item.filesystem_type is defined) -%}
            {% if ('swap' in storage_item.filesystem_type and storage_item.swap_path is not defined)
            or ('swap' not in storage_item.filesystem_type and storage_item.nfs_path is not defined) -%}
              {% set vol = volume_map.extend([
              {
                'definition_key': storage_item.name,
                'device': av_vol[0],
                'fstype': storage_item.filesystem_type | d('xfs'),
                'name': storage_item.name + idx|string,
                'size': storage_item.disk_size | d(0),
                'type': storage_item.disk_type | d('')
              }
              ]) %}
            {%- set _ = av_vol.pop(0) -%}
            {%- endif %}
          {%- endif %}
        {%- endfor %}
      {%- endfor %}
      {{ volume_map }}


# The volume creation task requires the above task to define the parameter
# which contains the calculated unique device names.
- name: SAP VM Provision - VMware - Provision Virtual Disk volumes and attach to VM
  vmware.vmware_rest.vcenter_vm_hardware_disk:
    vm: "{{ __sap_vm_provision_fact_vmware_vm_cluster_host_id }}"
    type: "{{ vol_item.type | upper }}"
    state: present
    label: "{{ vol_item.name }}"
    new_vmdk:
      name: "{{ inventory_hostname }}_{{ vol_item.name }}" # VMDK filename
      capacity: "{{ vol_item.size | human_to_bytes(default_unit='G') }}"
    # Hypervisor Control Plane credentials
    vcenter_hostname: "{{ sap_vm_provision_vmware_vcenter_hostname | d(lookup('env', 'VMWARE_HOST')) | d(omit) }}"
    vcenter_validate_certs: "{{ (sap_vm_provision_vmware_vcenter_validate_certs_bool | d(lookup('env', 'VMWARE_VALIDATE_CERTS'))) | bool | d(false) }}"
    vcenter_username: "{{ sap_vm_provision_vmware_vcenter_user | d(lookup('env', 'VMWARE_USER')) | d(omit) }}"
    vcenter_password: "{{ sap_vm_provision_vmware_vcenter_password | d(lookup('env', 'VMWARE_PASSWORD')) | d(omit) }}"
  loop: "{{ __sap_vm_provision_fact_filesystem_volume_map }}"
  loop_control:
    loop_var: vol_item
    index_var: vol_item_index
    label: "{{ vol_item.definition_key }}: {{ vol_item.name }} (size: {{ vol_item.size }})"
  register: __sap_vm_provision_register_provision_host_single_volumes
  no_log: "{{ __sap_vm_provision_no_log }}"
  when:
    - vol_item.fstype is defined
    - vol_item.size > 0
  failed_when:
    - not __sap_vm_provision_register_provision_host_single_volumes.value is defined
    - not 'already exists' in __sap_vm_provision_register_provision_host_single_volumes.msg


- name: SAP VM Provision - VMware - Combine details of provisioned hosts into one list
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_provisioned_hosts: "{{ __sap_vm_provision_fact_provisioned_hosts + [__merged_results] }}"
  # Append keys to provisioning result, that are not part of default return dictionary.
  vars:
    __merged_results:
      "{{ __sap_vm_provision_register_provision_host_single
        | combine({'host_node': inventory_hostname},
        {'sap_host_type': __sap_vm_provision_host_dict_spec.sap_host_type},
        {'sap_system_type': (__sap_vm_provision_host_dict_spec.sap_system_type | d(''))},
        {'__sap_vm_provision_register_gather_subset': __sap_vm_provision_register_gather_subset}) }}"
