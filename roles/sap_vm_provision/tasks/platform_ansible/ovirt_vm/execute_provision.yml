---

# When SAP HANA Scale-Out is used, if host name is not in original specifications then strip suffix node number from host name
- name: SAP VM Provision - OVirt - Set fact when performing SAP HANA Scale-Out
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_scaleout_origin_hostname: "{{ inventory_hostname | regex_replace('^(.+?)\\d*$', '\\1') }}"
  when:
    - sap_vm_provision_calculate_sap_hana_scaleout_active_coordinator is defined
    - not inventory_hostname in __sap_vm_provision_host_dict_plan.keys()

- name: SAP VM Provision - OVirt - Check if VM exists
  ovirt.ovirt.ovirt_vm_info:
    pattern: name={{ inventory_hostname }} and cluster={{ sap_vm_provision_ovirt_hypervisor_cluster_name }}
    auth: "{{ __sap_vm_provision_register_ovirt_session.ansible_facts.ovirt_auth }}"
  register: __sap_vm_provision_register_provision_host_single_check_exists
  no_log: "{{ __sap_vm_provision_no_log }}"

# For later check if the provided OS name is actually available
- name: SAP VM Provision - OVirt - Check available OS names in OVirt
  ovirt.ovirt.ovirt_vm_os_info:
    auth: "{{ __sap_vm_provision_register_ovirt_session.ansible_facts.ovirt_auth }}"
  register: __sap_vm_provision_register_ovirt_os
  no_log: "{{ __sap_vm_provision_no_log }}"


- name: Block that provisions the VM
  when: __sap_vm_provision_register_provision_host_single_check_exists.ovirt_vms | d([]) | length == 0
  block:

    - name: SAP VM Provision - OVirt - Provision Kickstart definition of Virtual Disk boot volumes
      ovirt.ovirt.ovirt_disk:
        name: "{{ inventory_hostname }}-vol_os"
        size: "{{ sap_vm_provision_ovirt_vm_kickstart_definition.boot_disk.size }}"
        format: "{{ sap_vm_provision_ovirt_vm_kickstart_definition.boot_disk.format }}"
        storage_domain: "{{ sap_vm_provision_ovirt_hypervisor_cluster_storage_domain_name }}" # Hypervisor Cluster's attached storage domain
        wait: true
        auth: "{{ __sap_vm_provision_register_ovirt_session.ansible_facts.ovirt_auth }}"
      when:
        - sap_vm_provision_ovirt_vm_kickstart_definition | d({}) | length > 0
        - sap_vm_provision_ovirt_vm_template_name | d('') | length == 0
      register: __sap_vm_provision_register_provision_host_single_boot_disk
      no_log: "{{ __sap_vm_provision_no_log }}"
      until: __sap_vm_provision_register_provision_host_single_boot_disk.disk.status == 'ok'
      retries: 600

    - name: SAP VM Provision - OVirt - Merge disk provisioning result with disk attachment definition
      ansible.builtin.set_fact:
        __sap_vm_provision_fact_merge_provisioned_boot_disks:
          "{{ __sap_vm_provision_register_provision_host_single_boot_disk.disk
            | combine(sap_vm_provision_ovirt_vm_kickstart_definition.boot_disk) }}"
      when:
        - sap_vm_provision_ovirt_vm_kickstart_definition | d({}) | length > 0
        - __sap_vm_provision_register_provision_host_single_boot_disk is defined

    - name: SAP VM Provision - OVirt - Convert disk provisioning result to disk attachment list
      ansible.builtin.set_fact:
        __sap_vm_provision_fact_provisioned_boot_disks:
          "{{ __sap_vm_provision_fact_provisioned_boot_disks | d([]) + [__sap_vm_provision_fact_merge_provisioned_boot_disks] }}"
      when:
        - sap_vm_provision_ovirt_vm_kickstart_definition | d({}) | length > 0
        - __sap_vm_provision_register_provision_host_single_boot_disk is defined


    - name: SAP VM Provision - OVirt - Provision OVirt Virtual Machine
      ovirt.ovirt.ovirt_vm:

        ## Virtual Machine target Hypervisor definition
        cluster: "{{ sap_vm_provision_ovirt_hypervisor_cluster_name }}" # Hypervisor Cluster
        host: "{{ sap_vm_provision_ovirt_hypervisor_cluster_host_node_name | d('') }}" # Hypervisor Cluster Node
        storage_domain: "{{ sap_vm_provision_ovirt_hypervisor_cluster_storage_domain_name }}" # Hypervisor Cluster's attached storage domain

        ## Virtual Machine definition
        state: running
        wait: true # wait until VM is running before Ansible Module is marked as completed
        timeout: 1200 # seconds, wait 20 minutes for VM to provision
        name: "{{ inventory_hostname }}"
        description: "{{ inventory_hostname }} created by Ansible Playbook for SAP"
        comment: "{{ inventory_hostname }} created by Ansible Playbook for SAP"

        ## Virtual Machine main resources definition
        cpu_sockets: "{{ target_provision_host_spec.ovirt_vm_cpu_threads }}"
        # Size suffix uses IEC 60027-2 standard (for example 1GiB, 1024MiB)
        memory: "{{ target_provision_host_spec.ovirt_vm_memory_gib }}GiB"
        # Make sure guaranteed memory is defined to avoid error when calculated larger than set in VM template.
        memory_guaranteed: "{{ target_provision_host_spec.ovirt_vm_memory_gib }}GiB"

        ## Virtual Machine settings configuration
        # Do not use Memory (RAM) ballooning, avoid over-commit of Memory
        ballooning_enabled: false
        boot_devices:
          - hd
          - network
        boot_menu: "{{ sap_vm_provision_ovirt_vm_boot_menu }}"
        usb_support: false
        soundcard_enabled: false
        high_availability: false
        operating_system: "{{ sap_vm_provision_ovirt_vm_operating_system }}"
        placement_policy: "{{ target_provision_host_spec.ovirt_vm_placement_policy | d('pinned') }}"
        stateless: false
        timezone: "{{ sap_vm_provision_ovirt_vm_timezone }}"
        # Virtual Machine Type: high_performance, server, desktop
        type: "{{ target_provision_host_spec.ovirt_vm_type | d('high_performance') }}"

        ## Virtual Machine Storage configuration
        disk_format: "{{ sap_vm_provision_ovirt_vm_disk_type }}" # RHV default is 'cow' = thin provisioning
        disks: "{{ __sap_vm_provision_fact_provisioned_boot_disks | d([]) }}" # If using VM Template, leave blank (list)

        ## Virtual Machine Network configuration - virtio vNICs
        nics: "{{ sap_vm_provision_ovirt_vm_nics | d([]) }}" # Optional definition of NIC devices list

        ## Option 1: Virtual Machine clone from VM Template
        template: "{{ sap_vm_provision_ovirt_vm_template_name }}" # VM Template name stored on Hypervisor Cluster
        # template_version: "" # default is the latest available version of the template
        # use_latest_template_version: true # if true, forces a stateless VM, keep as reminder
        # allow_partial_import: false
        clone: "{{ sap_vm_provision_ovirt_vm_clone_independent }}" # VM will be cloned as (in)dependent from template
        clone_permissions: true # VM Template permissions are cloned

        ## Option 2: Virtual Machine deployment through PXE and Kickstart
        # Requires definition: sap_vm_provision_ovirt_vm_kickstart_definition
        cd_iso: "{{ sap_vm_provision_ovirt_vm_kickstart_definition.os_image_iso | d('') }}"
        initrd_path: "{{ sap_vm_provision_ovirt_vm_kickstart_definition.initrd_path | d('') }}"
        kernel_path: "{{ sap_vm_provision_ovirt_vm_kickstart_definition.kernel_path | d('') }}"
        kernel_params: "{{ sap_vm_provision_ovirt_vm_kickstart_definition.kernel_params | d('') }}"
        kernel_params_persist: false # do not save beyond one run to avoid an installation loop

        ## Post-provisioning: Virtual Machine post configuration using cloud-init.
        # Requires provisioning from a template, which was cloud-enabled.
        # Cloud-init is run once (persist = false) or at each boot (persist = true).
        cloud_init_persist: "{{ sap_vm_provision_ovirt_vm_cloud_init_persist | d('false') }}"
        cloud_init: "{{ sap_vm_provision_ovirt_vm_cloud_init | d({}) }}"

        # Make sure the kernel and cloud-init options are executed once,
        # but are not repeated after a reboot (volatile = true).
        # Default is 'false'.
        # UI option: "Rollback this configuration during reboots"
        volatile: true

        auth: "{{ __sap_vm_provision_register_ovirt_session.ansible_facts.ovirt_auth }}"

      # Report VM back only after it is done creating the clone image.

      register: __sap_vm_provision_register_provision_host_single
      no_log: "{{ __sap_vm_provision_no_log }}"
      until: __sap_vm_provision_register_provision_host_single.vm.status != "image_locked"
      retries: 120
      delay: 5


- name: SAP VM Provision - OVirt - Start the VM, if not running
  ovirt.ovirt.ovirt_vm:
    name: "{{ inventory_hostname }}"
    state: running
    auth: "{{ __sap_vm_provision_register_ovirt_session.ansible_facts.ovirt_auth }}"
  register: __sap_vm_provision_register_vm_start
  no_log: "{{ __sap_vm_provision_no_log }}"

- name: SAP VM Provision - OVirt - Remove installation ISO from the config
  ovirt.ovirt.ovirt_vm:
    name: "{{ inventory_hostname }}"
    cd_iso: ""
    auth: "{{ __sap_vm_provision_register_ovirt_session.ansible_facts.ovirt_auth }}"
  register: __sap_vm_provision_register_remove_iso
  no_log: "{{ __sap_vm_provision_no_log }}"
  when: sap_vm_provision_ovirt_vm_kickstart_definition | d({}) | length > 0

- name: SAP VM Provision - OVirt - Check VM status
  ovirt.ovirt.ovirt_vm_info:
    pattern: name={{ inventory_hostname }} and cluster={{ sap_vm_provision_ovirt_hypervisor_cluster_name }}
    all_content: true
    fetch_nested: true
    nested_attributes:
      - ips
      - name
      - applications
    auth: "{{ __sap_vm_provision_register_ovirt_session.ansible_facts.ovirt_auth }}"
  register: __sap_vm_provision_register_provision_host_single_info
  no_log: "{{ __sap_vm_provision_no_log }}"
  # Allow for 15 minutes until the VM reports devices, which include the IP and
  # are required in following tasks.
  until: __sap_vm_provision_register_provision_host_single_info.ovirt_vms[0].reported_devices | length > 0
  retries: 180
  delay: 5


- name: SAP VM Provision - OVirt - Create fact for delegate host IP
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_private_ip:
      "{{ __sap_vm_provision_register_provision_host_single_info.ovirt_vms[0].reported_devices[0].ips[0].address }}"


- name: SAP VM Provision - OVirt - Copy facts to delegate host - when using Bastion SSH Proxy connection from Ansible control node to target node/s
  delegate_to: "{{ __sap_vm_provision_fact_private_ip }}"
  delegate_facts: true
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_ssh_args_bastion: >-
      -o ProxyCommand='ssh -W %h:%p {{ sap_vm_provision_bastion_user }}@{{ sap_vm_provision_bastion_public_ip }}
      -p {{ sap_vm_provision_bastion_ssh_port }}
      -i {{ sap_vm_provision_ssh_bastion_private_key_file_path }}
      {{ sap_vm_provision_ssh_bastion_ssh_args }}'
  when:
    - sap_vm_provision_bastion_execution
    - sap_vm_provision_bastion_user | d('') != ''
    - sap_vm_provision_bastion_public_ip | d('') != ''
    - sap_vm_provision_bastion_ssh_port | d('') != ''
    - sap_vm_provision_ssh_bastion_private_key_file_path | d('') != ''


- name: SAP VM Provision - OVirt - Collect only facts about hardware
  register: __sap_vm_provision_task_ansible_facts_host_disks_info
  ansible.builtin.setup:
    gather_subset:
      - hardware
  remote_user: root
  become: true
  become_user: root
  delegate_to: "{{ __sap_vm_provision_fact_private_ip }}"
  delegate_facts: false
  vars:
    ansible_ssh_private_key_file: "{{ sap_vm_provision_ssh_host_private_key_file_path }}"
    ansible_ssh_common_args: "{{ sap_vm_provision_ssh_host_ssh_args }} {{ __sap_vm_provision_fact_ssh_args_bastion | d('') }}"


- name: SAP VM Provision - OVirt - Set fact for available storage volume device names
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_available_volumes: |-
      {% set ansible_facts_devices_used_list = __sap_vm_provision_task_ansible_facts_host_disks_info.ansible_facts.ansible_device_links.ids.keys() | list %}
      {% set volumes = [] %}
      {%- for letter in __sap_vm_provision_storage_vol_letters -%}
        {% for device in ansible_facts_devices_used_list -%}
          {% if '/dev/sd' + letter not in device -%}
            {% set dev = volumes.append('/dev/sd' + letter) %}
      {%- endif %}
      {%- endfor %}
      {% endfor %}
      {{ volumes | list | unique }}


# Combination of only the filesystem volume information from the host_specifications_dictionary
# for volume device assignment.
# This task assigns device names for each volume to be created.
- name: SAP VM Provision - OVirt - Set fact for target device map
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_filesystem_volume_map: |
      {% set volume_map = [] -%}
      {% set av_vol = __sap_vm_provision_fact_available_volumes -%}
      {% for storage_item in target_provision_host_spec.storage_definition -%}
        {% for idx in range(0, storage_item.disk_count | d(1)) -%}
          {% if (storage_item.filesystem_type is defined) -%}
            {% if ('swap' in storage_item.filesystem_type and storage_item.swap_path is not defined)
            or ('swap' not in storage_item.filesystem_type and storage_item.nfs_path is not defined) -%}
              {% set vol = volume_map.extend([
              {
                'definition_key': storage_item.name,
                'device': av_vol[0],
                'fstype': storage_item.filesystem_type | d('xfs'),
                'name': storage_item.name + idx|string,
                'size': storage_item.disk_size | d(0),
                'type': storage_item.disk_type | d('')
              }
              ]) %}
            {%- set _ = av_vol.pop(0) -%}
            {%- endif %}
          {%- endif %}
        {%- endfor %}
      {%- endfor %}
      {{ volume_map }}


# The volume creation task requires the above task to define the parameter
# which contains the calculated unique device names.
- name: SAP VM Provision - OVirt - Provision Virtual Disk volumes for OVirt VM filesystems
  ovirt.ovirt.ovirt_disk:
    name: "{{ inventory_hostname }}-vol_{{ vol_item.name }}"
    vm_name: "{{ inventory_hostname }}"
    size: "{{ vol_item.size }}GiB"
    format: cow
    interface: virtio_scsi
    storage_domain: "{{ sap_vm_provision_ovirt_hypervisor_cluster_storage_domain_name }}" # Hypervisor Cluster's attached storage domain
    wait: true
    bootable: false
    auth: "{{ __sap_vm_provision_register_ovirt_session.ansible_facts.ovirt_auth }}"
  loop: "{{ __sap_vm_provision_fact_filesystem_volume_map }}"
  loop_control:
    loop_var: vol_item
    index_var: vol_item_index
    label: "{{ vol_item.definition_key }}: {{ vol_item.name }} (size: {{ vol_item.size }})"
  register: __sap_vm_provision_register_provision_host_single_volumes
  no_log: "{{ __sap_vm_provision_no_log }}"
  when:
    - vol_item.fstype is defined
    - vol_item.size > 0


- name: SAP VM Provision - OVirt - Combine details of provisioned hosts into one list
  ansible.builtin.set_fact:
    __sap_vm_provision_fact_provisioned_hosts: "{{ __sap_vm_provision_fact_provisioned_hosts + [__merged_results] }}"
  # Append keys to provisioning result, that are not part of default return dictionary.
  vars:
    __merged_results:
      "{{ __sap_vm_provision_register_provision_host_single
        | combine({'host_node': inventory_hostname},
        {'sap_host_type': __sap_vm_provision_host_dict_spec.sap_host_type},
        {'sap_system_type': (__sap_vm_provision_host_dict_spec.sap_system_type | d(''))}) }}"
